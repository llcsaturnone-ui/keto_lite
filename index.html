<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="КБЖУ" />
  <meta name="theme-color" content="#09090b" />
  <title>КБЖУ Трекер</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    html, body, #root {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
      overscroll-behavior-y: none;
      -webkit-tap-highlight-color: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
    }

    ::-webkit-scrollbar {
      width: 0;
      height: 0;
      background: transparent;
    }

    .safe-pt {
      padding-top: max(32px, env(safe-area-inset-top));
    }

    .safe-pb {
      padding-bottom: max(16px, env(safe-area-inset-bottom));
    }

    .fast-touch {
      touch-action: manipulation;
    }

    .app-shell {
      height: 100dvh;
      min-height: 100dvh;
    }

    input, select, textarea {
      font-size: 16px;
    }

    select {
      background-image: none;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    const IconPlus = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14m-7-7h14"/></svg>;
    const IconBook = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>;
    const IconCalendar = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
    const IconChevronLeft = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>;
    const IconChevronRight = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>;
    const IconTrash = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6"/></svg>;
    const IconTarget = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
    const IconDumbbell = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6.5 6.5 11 11"/><path d="m21 21-1-1"/><path d="m3 3 1 1"/><path d="m18 22 4-4"/><path d="m2 6 4-4"/><path d="m3 10 7-7"/><path d="m14 21 7-7"/></svg>;
    const IconFootprints = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 16v-2.38c0-.91.64-1.7 1.53-1.87l1.25-.24c.68-.13 1.35.25 1.59.9l.56 1.52A2.4 2.4 0 0 1 7.22 17L6 17.5A1.45 1.45 0 0 1 4 16Z"/><path d="M10 20.5v-2.38c0-.91.64-1.7 1.53-1.87l1.25-.24c.68-.13 1.35.25 1.59.9l.56 1.52A2.4 2.4 0 0 1 13.22 21L12 21.5a1.45 1.45 0 0 1-2-1Z"/><path d="M14 4.5v2.38c0 .91.64 1.7 1.53 1.87l1.25.24c.68.13 1.35-.25 1.59-.9l.56-1.52A2.4 2.4 0 0 0 17.22 3L16 2.5a1.45 1.45 0 0 0-2 2Z"/></svg>;
    const IconScale = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/></svg>;
    const IconDownload = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>;
    const IconEdit = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>;
    const IconSettings = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.38a2 2 0 0 0-.73-2.73l-.15-.09a2 2 0 0 1-1-1.74v-.51a2 2 0 0 1 1-1.72l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2Z"/><circle cx="12" cy="12" r="3"/></svg>;

    const STORAGE_KEY = "kbju_tracker_v12_single_state";

    const getLocalDateString = (dateObj) => {
      const year = dateObj.getFullYear();
      const month = String(dateObj.getMonth() + 1).padStart(2, "0");
      const day = String(dateObj.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    };

    const displayDate = (dateString) => {
      const [year, month, day] = dateString.split("-");
      const d = new Date(year, month - 1, day);
      const todayStr = getLocalDateString(new Date());

      if (dateString === todayStr) return "Сегодня";

      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      if (dateString === getLocalDateString(yesterday)) return "Вчера";

      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      if (dateString === getLocalDateString(tomorrow)) return "Завтра";

      return d.toLocaleDateString("ru-RU", { day: "numeric", month: "long" });
    };

    const num = (value) => {
      const parsed = parseFloat(String(value ?? "").replace(",", "."));
      return Number.isFinite(parsed) ? parsed : 0;
    };

    const round = (value, digits = 1) => {
      const k = Math.pow(10, digits);
      return Math.round(num(value) * k) / k;
    };

    const pct = (current, target) => {
      if (!num(target)) return 0;
      return Math.min(100, Math.max(0, (num(current) / num(target)) * 100));
    };

    const sum = (arr) => (arr || []).reduce((a, b) => a + num(b), 0);

    const today = getLocalDateString(new Date());

    const defaultState = () => ({
      appVersion: 12,
      foods: [
        { id: "f1", name: "Куриное филе", calories: 113, protein: 23.6, fat: 1.9, carbs: 0 },
        { id: "f2", name: "Гречка варёная", calories: 132, protein: 4.5, fat: 1.3, carbs: 25 },
        { id: "f3", name: "Яйцо куриное", calories: 157, protein: 12.7, fat: 10.9, carbs: 0.7 },
        { id: "f4", name: "Творог 5%", calories: 121, protein: 17, fat: 5, carbs: 1.8 },
        { id: "f5", name: "Огурец", calories: 15, protein: 0.8, fat: 0.1, carbs: 2.8 },
        { id: "f6", name: "ПП батончик", calories: 465, protein: 8.8, fat: 35.3, carbs: 11.8 }
      ],
      foodLogsByDate: {},
      goalsByDate: {
        [today]: { calories: 2100, protein: 160, fat: 70, carbs: 150 }
      },
      measurementsByDate: {
        [today]: { weight: "", waist: "" }
      },
      trainingTemplate: [
        { id: "e_push", title: "Отжимания", unit: "reps", targets: [10, 10, 10] },
        { id: "e_squat", title: "Приседания", unit: "reps", targets: [15, 15, 15] },
        { id: "e_pull", title: "Подтягивания / негативы", unit: "reps", targets: [3, 3, 3] },
        { id: "e_plank", title: "Планка", unit: "sec", targets: [30, 30, 30] },
        { id: "e_abs", title: "Пресс", unit: "reps", targets: [15, 15, 15] },
        { id: "e_steps", title: "Ходьба", unit: "steps", targets: [7000] }
      ],
      trainingsByDate: {}
    });

    function cloneExercise(ex) {
      return {
        id: `${ex.id}_${Date.now()}_${Math.random().toString(36).slice(2)}`,
        templateId: ex.id,
        title: ex.title,
        unit: ex.unit,
        targets: [...(ex.targets || [])],
        actuals: (ex.targets || []).map(() => "")
      };
    }

    function cloneTemplate(template) {
      return template.map(cloneExercise);
    }

    function unitLabel(unit) {
      if (unit === "sec") return "сек";
      if (unit === "steps") return "шаг";
      return "раз";
    }

    function unitColor(unit) {
      if (unit === "sec") return "amber";
      if (unit === "steps") return "emerald";
      return "indigo";
    }

    function colorClass(color, type = "text") {
      const map = {
        emerald: { text: "text-emerald-400", bg: "bg-emerald-500", border: "border-emerald-500/30" },
        indigo: { text: "text-indigo-400", bg: "bg-indigo-500", border: "border-indigo-500/30" },
        amber: { text: "text-amber-400", bg: "bg-amber-500", border: "border-amber-500/30" },
        sky: { text: "text-sky-400", bg: "bg-sky-500", border: "border-sky-500/30" },
        rose: { text: "text-rose-400", bg: "bg-rose-500", border: "border-rose-500/30" }
      };
      return map[color]?.[type] || map.emerald[type];
    }

    function getPreviousDateKey(map, date) {
      const keys = Object.keys(map || {}).filter(k => k <= date).sort();
      return keys.length ? keys[keys.length - 1] : null;
    }

    function ProgressBar({ value, color = "emerald" }) {
      return (
        <div className="h-2 w-full bg-zinc-950 rounded-full overflow-hidden">
          <div className={`h-full ${colorClass(color, "bg")} transition-all duration-500`} style={{ width: `${value}%` }} />
        </div>
      );
    }

    function MacroMini({ label, value, target, color, unit = "г" }) {
      const left = num(target) - num(value);
      const isOver = left < 0;
      const usedColor = isOver ? "rose" : color;

      return (
        <div className="bg-[#18181b] border border-zinc-800/50 rounded-2xl p-3">
          <div className="flex justify-between items-center mb-2">
            <span className="text-[9px] text-zinc-500 font-black uppercase">{label}</span>
            <span className={`text-[10px] font-black ${isOver ? "text-rose-400" : "text-zinc-400"}`}>
              {isOver ? "+" : ""}{round(Math.abs(left), 0)} {unit}
            </span>
          </div>
          <div className={`font-black text-lg ${colorClass(color, "text")}`}>
            {round(value, unit === "ккал" ? 0 : 1)}
            <span className="text-[10px] text-zinc-600 ml-1">/ {target}</span>
          </div>
          <div className="mt-2">
            <ProgressBar value={pct(value, target)} color={usedColor} />
          </div>
        </div>
      );
    }

    function SectionButton({ icon, label, onClick, color = "zinc" }) {
      const colorMap = {
        emerald: "bg-emerald-600 active:bg-emerald-700",
        indigo: "bg-indigo-600 active:bg-indigo-700",
        amber: "bg-amber-600 active:bg-amber-700",
        sky: "bg-sky-600 active:bg-sky-700",
        zinc: "bg-[#27272a] active:bg-zinc-700"
      };

      return (
        <button onClick={onClick} className={`fast-touch ${colorMap[color]} text-white rounded-2xl p-4 font-bold transition-transform active:scale-95 flex items-center justify-center gap-2`}>
          {icon}
          <span>{label}</span>
        </button>
      );
    }

    function App() {
      const [state, setState] = useState(() => {
        try {
          return JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultState();
        } catch {
          return defaultState();
        }
      });

      const [currentDate, setCurrentDate] = useState(today);
      const [activeTab, setActiveTab] = useState("home");

      const [foodNameInput, setFoodNameInput] = useState("");
      const [gramsInput, setGramsInput] = useState("");

      const [showFoodBase, setShowFoodBase] = useState(false);
      const [showTrainingBase, setShowTrainingBase] = useState(false);
      const [showDaySettings, setShowDaySettings] = useState(false);

      const [newFood, setNewFood] = useState({ name: "", calories: "", protein: "", fat: "", carbs: "" });
      const [editingFoodId, setEditingFoodId] = useState(null);
      const [editingFood, setEditingFood] = useState(null);

      const [newExercise, setNewExercise] = useState({ title: "", unit: "reps", targets: "10,10,10" });
      const [editingExerciseId, setEditingExerciseId] = useState(null);
      const [editingExercise, setEditingExercise] = useState(null);

      useEffect(() => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }, [state]);

      function getGoalsForDate(date) {
        if (state.goalsByDate?.[date]) return state.goalsByDate[date];

        const prevKey = getPreviousDateKey(state.goalsByDate, date);
        const fallback = prevKey ? state.goalsByDate[prevKey] : { calories: 2100, protein: 160, fat: 70, carbs: 150 };

        return { ...fallback };
      }

      function ensureGoalsForDate(date) {
        if (state.goalsByDate?.[date]) return;

        const newGoals = getGoalsForDate(date);

        setState(prev => ({
          ...prev,
          goalsByDate: {
            ...(prev.goalsByDate || {}),
            [date]: newGoals
          }
        }));
      }

      function getMeasurementsForDate(date) {
        return state.measurementsByDate?.[date] || { weight: "", waist: "" };
      }

      function getTrainingForDate(date) {
        if (state.trainingsByDate?.[date]) return state.trainingsByDate[date];
        return cloneTemplate(state.trainingTemplate || []);
      }

      function ensureTrainingForDate(date) {
        if (state.trainingsByDate?.[date]) return;

        setState(prev => ({
          ...prev,
          trainingsByDate: {
            ...(prev.trainingsByDate || {}),
            [date]: cloneTemplate(prev.trainingTemplate || [])
          }
        }));
      }

      useEffect(() => {
        ensureGoalsForDate(currentDate);
        ensureTrainingForDate(currentDate);
      }, [currentDate]);

      const goals = getGoalsForDate(currentDate);
      const measures = getMeasurementsForDate(currentDate);
      const currentTraining = getTrainingForDate(currentDate);
      const currentDayLogs = state.foodLogsByDate?.[currentDate] || [];

      const totals = useMemo(() => {
        return currentDayLogs.reduce((sum, log) => {
          sum.calories += num(log.totalCalories);
          sum.protein += num(log.totalProtein);
          sum.fat += num(log.totalFat);
          sum.carbs += num(log.totalCarbs);
          return sum;
        }, { calories: 0, protein: 0, fat: 0, carbs: 0 });
      }, [currentDayLogs]);

      const remaining = {
        calories: num(goals.calories) - totals.calories,
        protein: num(goals.protein) - totals.protein,
        fat: num(goals.fat) - totals.fat,
        carbs: num(goals.carbs) - totals.carbs
      };

      const trainingSummary = useMemo(() => {
        const items = currentTraining || [];
        const exerciseProgresses = items.map(ex => {
          const target = sum(ex.targets);
          const actual = sum(ex.actuals);
          return target ? Math.min(100, (actual / target) * 100) : 0;
        });
        const avg = exerciseProgresses.length ? exerciseProgresses.reduce((a,b) => a + b, 0) / exerciseProgresses.length : 0;
        const completed = exerciseProgresses.filter(x => x >= 100).length;
        return { avg, completed, total: items.length };
      }, [currentTraining]);

      function calcFood(food, gramsValue) {
        const grams = num(gramsValue);
        return {
          calories: Math.round((grams / 100) * num(food.calories)),
          protein: round((grams / 100) * num(food.protein), 1),
          fat: round((grams / 100) * num(food.fat), 1),
          carbs: round((grams / 100) * num(food.carbs), 1)
        };
      }

      function addFoodLog(e) {
        e.preventDefault();

        const clean = foodNameInput.trim().toLowerCase();
        const food = state.foods.find(f => f.name.trim().toLowerCase() === clean);
        const grams = num(gramsInput);

        if (!food) {
          alert("Такого продукта нет в базе. Добавь его через кнопку «База продуктов».");
          return;
        }

        if (!grams) return;

        const calculated = calcFood(food, grams);

        const log = {
          id: Date.now().toString(),
          foodId: food.id,
          foodName: food.name,
          grams,
          totalCalories: calculated.calories,
          totalProtein: calculated.protein,
          totalFat: calculated.fat,
          totalCarbs: calculated.carbs
        };

        setState(prev => ({
          ...prev,
          foodLogsByDate: {
            ...(prev.foodLogsByDate || {}),
            [currentDate]: [...(prev.foodLogsByDate?.[currentDate] || []), log]
          }
        }));

        setFoodNameInput("");
        setGramsInput("");
      }

      function deleteFoodLog(logId) {
        setState(prev => ({
          ...prev,
          foodLogsByDate: {
            ...(prev.foodLogsByDate || {}),
            [currentDate]: (prev.foodLogsByDate?.[currentDate] || []).filter(l => l.id !== logId)
          }
        }));
      }

      function saveNewFood(e) {
        e.preventDefault();

        if (!newFood.name.trim()) return;

        setState(prev => ({
          ...prev,
          foods: [
            ...(prev.foods || []),
            {
              id: Date.now().toString(),
              name: newFood.name.trim(),
              calories: num(newFood.calories),
              protein: num(newFood.protein),
              fat: num(newFood.fat),
              carbs: num(newFood.carbs)
            }
          ]
        }));

        setNewFood({ name: "", calories: "", protein: "", fat: "", carbs: "" });
      }

      function startEditFood(food) {
        setEditingFoodId(food.id);
        setEditingFood({ ...food });
      }

      function saveEditFood() {
        if (!editingFood?.name?.trim()) return;

        setState(prev => ({
          ...prev,
          foods: prev.foods.map(f => f.id === editingFoodId ? {
            ...f,
            name: editingFood.name.trim(),
            calories: num(editingFood.calories),
            protein: num(editingFood.protein),
            fat: num(editingFood.fat),
            carbs: num(editingFood.carbs)
          } : f)
        }));

        setEditingFoodId(null);
        setEditingFood(null);
      }

      function deleteFood(foodId) {
        setState(prev => ({
          ...prev,
          foods: prev.foods.filter(f => f.id !== foodId)
        }));
      }

      function updateGoalsForDate(key, value) {
        setState(prev => ({
          ...prev,
          goalsByDate: {
            ...(prev.goalsByDate || {}),
            [currentDate]: {
              ...getGoalsFromState(prev, currentDate),
              [key]: value
            }
          }
        }));
      }

      function getGoalsFromState(source, date) {
        if (source.goalsByDate?.[date]) return source.goalsByDate[date];

        const prevKey = getPreviousDateKey(source.goalsByDate, date);
        return prevKey ? source.goalsByDate[prevKey] : { calories: 2100, protein: 160, fat: 70, carbs: 150 };
      }

      function updateMeasurement(key, value) {
        setState(prev => ({
          ...prev,
          measurementsByDate: {
            ...(prev.measurementsByDate || {}),
            [currentDate]: {
              ...(prev.measurementsByDate?.[currentDate] || {}),
              [key]: value
            }
          }
        }));
      }

      function updateExerciseActual(exId, index, value) {
        setState(prev => {
          const dayList = prev.trainingsByDate?.[currentDate] || cloneTemplate(prev.trainingTemplate || []);
          const updated = dayList.map(ex => {
            if (ex.id !== exId) return ex;
            const actuals = [...(ex.actuals || [])];
            actuals[index] = value;
            return { ...ex, actuals };
          });

          return {
            ...prev,
            trainingsByDate: {
              ...(prev.trainingsByDate || {}),
              [currentDate]: updated
            }
          };
        });
      }

      function saveNewExercise(e) {
        e.preventDefault();

        if (!newExercise.title.trim()) return;

        const targets = parseTargets(newExercise.targets);

        setState(prev => ({
          ...prev,
          trainingTemplate: [
            ...(prev.trainingTemplate || []),
            {
              id: Date.now().toString(),
              title: newExercise.title.trim(),
              unit: newExercise.unit,
              targets
            }
          ]
        }));

        setNewExercise({
          title: "",
          unit: "reps",
          targets: newExercise.unit === "steps" ? "7000" : "10,10,10"
        });
      }

      function parseTargets(raw) {
        return String(raw || "")
          .split(",")
          .map(x => num(x.trim()))
          .filter(x => x > 0);
      }

      function startEditExercise(ex) {
        setEditingExerciseId(ex.id);
        setEditingExercise({ ...ex, targetsText: (ex.targets || []).join(",") });
      }

      function saveEditExercise() {
        if (!editingExercise?.title?.trim()) return;

        const targets = parseTargets(editingExercise.targetsText);

        setState(prev => ({
          ...prev,
          trainingTemplate: prev.trainingTemplate.map(ex => ex.id === editingExerciseId ? {
            ...ex,
            title: editingExercise.title.trim(),
            unit: editingExercise.unit,
            targets
          } : ex)
        }));

        setEditingExerciseId(null);
        setEditingExercise(null);
      }

      function deleteExercise(exId) {
        setState(prev => ({
          ...prev,
          trainingTemplate: prev.trainingTemplate.filter(ex => ex.id !== exId)
        }));
      }

      function applyTemplateToCurrentDay() {
        if (!confirm("Заменить тренировку этого дня новым шаблоном? Уже введённые подходы за этот день сотрутся.")) return;

        setState(prev => ({
          ...prev,
          trainingsByDate: {
            ...(prev.trainingsByDate || {}),
            [currentDate]: cloneTemplate(prev.trainingTemplate || [])
          }
        }));
      }

      function exportBackup() {
        const backup = {
          ...state,
          exportedAt: new Date().toISOString(),
          currentDate
        };

        const blob = new Blob([JSON.stringify(backup, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `kbju-tracker-backup-${currentDate}.json`;
        a.click();
        URL.revokeObjectURL(url);
      }

      function importBackup(e) {
        const file = e.target.files?.[0];
        if (!file) return;

        const reader = new FileReader();

        reader.onload = () => {
          try {
            const data = JSON.parse(reader.result);
            setState(data);
            alert("Backup восстановлен");
          } catch {
            alert("Не получилось прочитать backup");
          }
        };

        reader.readAsText(file);
      }

      function changeDate(offset) {
        const d = new Date(currentDate);
        d.setDate(d.getDate() + offset);
        setCurrentDate(getLocalDateString(d));
        setShowFoodBase(false);
        setShowTrainingBase(false);
        setShowDaySettings(false);
      }

      function goToday() {
        setCurrentDate(today);
        setShowFoodBase(false);
        setShowTrainingBase(false);
        setShowDaySettings(false);
      }

      const previewFood = state.foods.find(f => f.name.trim().toLowerCase() === foodNameInput.trim().toLowerCase());

            <div className="flex justify-between items-start gap-3">
              <div>
                <h1 className="text-lg font-bold">
                  {activeTab === "home" && "Главная"}
                  {activeTab === "food" && "Еда"}
                  {activeTab === "training" && "Тренировка"}
                </h1>
                <p className="text-[10px] text-zinc-500 font-bold uppercase mt-1">КБЖУ · дефицит · база</p>
              </div>

              <div className="text-right">
                <div className={`text-lg font-black ${remaining.calories < 0 ? "text-rose-400" : "text-emerald-400"}`}>
                  {Math.round(remaining.calories)}

                <div className="text-[9px] text-zinc-500 font-bold uppercase">ккал осталось</div>
              </div>
            </div>

            <div className="flex items-center justify-between bg-[#18181b] rounded-2xl p-1 border border-zinc-800/50 mt-4">

              <button onClick={goToday} className="fast-touch bg-transparent px-3 py-2">
                <div className="font-bold text-sm text-zinc-200">{displayDate(currentDate)}</div>
                <div className="text-[9px] text-zinc-600 font-bold uppercase">{currentDate}</div>
              </button>

              <button onClick={() => changeDate(1)} className="fast-touch p-3 text-zinc-400 active:text-zinc-200 bg-transparent">
                <IconChevronRight className="w-5 h-5" />
              </button>
            </div>
          </header>

          <main className="flex-1 overflow-y-auto px-5 pt-4 pb-8">
            {activeTab === "home" && (

                  <div className="flex justify-between items-end mb-4">
                    <div>
                      <p className="text-[10px] text-zinc-500 uppercase font-bold mb-1">Калории</p>
                      <div className="flex items-baseline gap-1">
                        <span className="text-4xl font-black">{Math.round(totals.calories)}</span>
                        <span className="text-zinc-600 text-xs">/ {goals.calories}</span>
                      </div>
                    </div>

                    <div className={`text-right font-black ${remaining.calories < 0 ? "text-rose-400" : "text-emerald-400"}`}>

                    <MacroMini label="Жиры" value={totals.fat} target={goals.fat} color="amber" />
                    <MacroMini label="Углев." value={totals.carbs} target={goals.carbs} color="sky" />

                <div className="grid grid-cols-2 gap-3">

                    onChange={(e) => setFoodNameInput(e.target.value)}
                    required
                  />

                  <datalist id="foodOptions">
                    {state.foods.map(f => <option key={f.id} value={f.name} />)}
                  </datalist>

                  <div className="flex gap-3">
                    <input
                      type="number"
                      inputMode="decimal"
                      placeholder="Граммы"
                      className="flex-1 bg-[#27272a] rounded-2xl p-4 outline-none min-w-0 text-zinc-200"

                      onChange={(e) => setGramsInput(e.target.value)}
                      required
                    />

                    <button type="submit" className="w-14 shrink-0 bg-emerald-600 rounded-2xl flex items-center justify-center fast-touch active:scale-95 transition-transform">
                      <IconPlus className="w-6 h-6 text-white" />
                    </button>
                  </div>

                  {preview && (
                    <div className="grid grid-cols-4 gap-2 pt-1">

                      <PreviewBox color="text-amber-400" value={preview.fat} label="ж" />
                      <PreviewBox color="text-sky-400" value={preview.carbs} label="у" />
                    </div>
                  )}
                </form>

                <div className="space-y-3">
                  <h2 className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Еда за день</h2>

                  {currentDayLogs.length === 0 && (
                    <div className="bg-[#18181b] rounded-2xl p-5 text-center text-zinc-500 text-sm border border-zinc-800/30">

                    </div>
                  )}

                  {currentDayLogs.map(log => (
                    <div key={log.id} className="bg-[#18181b] rounded-2xl p-4 flex justify-between items-center border border-zinc-800/30">
                      <div className="min-w-0">
                        <p className="font-bold text-sm truncate">{log.foodName}</p>
                        <p className="text-[10px] text-zinc-500 font-bold uppercase">{log.grams} г</p>
                      </div>

                      <div className="flex items-center gap-4 text-right">

                          <div className="text-emerald-400 font-bold text-sm">{log.totalCalories}</div>
                          <div className="text-[9px] font-bold">
                            <span className="text-indigo-400">Б {log.totalProtein}</span>

            {activeTab === "training" && (

                    updateGoalsForDate={updateGoalsForDate}
                    updateMeasurement={updateMeasurement}
                  />
                )}

                {showTrainingBase && (
                  <TrainingBase

                    newExercise={newExercise}
                    setNewExercise={setNewExercise}

                    deleteExercise={deleteExercise}
                    applyTemplateToCurrentDay={applyTemplateToCurrentDay}

      return (

            <div className="grid grid-cols-2 gap-3">
              <input type="number" inputMode="decimal" placeholder="Ккал" className="w-full bg-[#27272a] rounded-xl p-3 outline-none min-w-0 text-emerald-400 font-bold" value={newFood.calories} onChange={(e) => setNewFood({...newFood, calories: e.target.value})} required />
              <input type="number" inputMode="decimal" placeholder="Белок" className="w-full bg-[#27272a] rounded-xl p-3 outline-none min-w-0 text-indigo-400 font-bold" value={newFood.protein} onChange={(e) => setNewFood({...newFood, protein: e.target.value})} required />
              <input type="number" inputMode="decimal" placeholder="Жиры" className="w-full bg-[#27272a] rounded-xl p-3 outline-none min-w-0 text-amber-400 font-bold" value={newFood.fat} onChange={(e) => setNewFood({...newFood, fat: e.target.value})} required />
              <input type="number" inputMode="decimal" placeholder="Углеводы" className="w-full bg-[#27272a] rounded-xl p-3 outline-none min-w-0 text-sky-400 font-bold" value={newFood.carbs} onChange={(e) => setNewFood({...newFood, carbs: e.target.value})} required />
            </div>

            <button type="submit" className="fast-touch w-full bg-indigo-600 active:bg-indigo-700 text-white rounded-xl p-4 font-bold transition-transform active:scale-95">
              Добавить продукт
            </button>
          </form>

          <div className="space-y-2">
            <h2 className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Список продуктов ({foods.length})</h2>

            {foods.map(f => (
              <div key={f.id} className="bg-[#18181b] rounded-xl p-3 border border-zinc-800/30">
                {editingFoodId === f.id ? (
                  <div className="space-y-3">
                    <input type="text" className="w-full bg-[#27272a] rounded-xl p-3 outline-none text-zinc-200" value={editingFood.name} onChange={(e) => setEditingFood({...editingFood, name: e.target.value})} />
                    <div className="grid grid-cols-2 gap-3">
                      <input type="number" inputMode="decimal" className="w-full bg-[#27272a] rounded-xl p-3 outline-none text-emerald-400 font-bold" value={editingFood.calories} onChange={(e) => setEditingFood({...editingFood, calories: e.target.value})} />
                      <input type="number" inputMode="decimal" className="w-full bg-[#27272a] rounded-xl p-3 outline-none text-indigo-400 font-bold" value={editingFood.protein} onChange={(e) => setEditingFood({...editingFood, protein: e.target.value})} />
                      <input type="number" inputMode="decimal" className="w-full bg-[#27272a] rounded-xl p-3 outline-none text-amber-400 font-bold" value={editingFood.fat} onChange={(e) => setEditingFood({...editingFood, fat: e.target.value})} />
                      <input type="number" inputMode="decimal" className="w-full bg-[#27272a] rounded-xl p-3 outline-none text-sky-400 font-bold" value={editingFood.carbs} onChange={(e) => setEditingFood({...editingFood, carbs: e.target.value})} />
                    </div>
                    <div className="grid grid-cols-2 gap-2">
                      <button onClick={saveEditFood} type="button" className="fast-touch bg-emerald-600 rounded-xl p-3 font-bold">Сохранить</button>
                      <button onClick={cancelEdit} type="button" className="fast-touch bg-[#27272a] rounded-xl p-3 font-bold">Отмена</button>
                    </div>
                  </div>
                ) : (
                  <div className="flex justify-between items-center gap-3">
                    <div className="flex-1 min-w-0">
                      <span className="text-sm font-medium truncate block">{f.name}</span>
                      <div className="flex gap-2 text-[10px] font-bold uppercase mt-1 flex-wrap">
                        <span className="text-emerald-500">{f.calories} ккал</span>
                        <span className="text-indigo-500">Б {f.protein || 0}</span>
                        <span className="text-amber-500">Ж {f.fat || 0}</span>
                        <span className="text-sky-500">У {f.carbs || 0}</span>
                      </div>
                    </div>

                    <button onClick={() => startEditFood(f)} className="fast-touch text-zinc-600 active:text-indigo-400 p-2 bg-transparent">
                      <IconEdit className="w-5 h-5" />
                    </button>

                    <button onClick={() => deleteFood(f.id)} className="fast-touch text-zinc-800 active:text-red-500 p-2 bg-transparent">
                      <IconTrash className="w-5 h-5" />
                    </button>
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      );
    }

    function TrainingBase({
      template,
      newExercise,
      setNewExercise,
      saveNewExercise,
      editingExerciseId,
      editingExercise,
      setEditingExercise,
      startEditExercise,
      saveEditExercise,
      cancelEdit,
      deleteExercise,
      applyTemplateToCurrentDay
    }) {
      return (
        <div className="space-y-5">
          <form onSubmit={saveNewExercise} className="bg-[#18181b] rounded-3xl p-5 border border-zinc-800/50 space-y-4">
            <h2 className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Новое упражнение</h2>

            <input type="text" placeholder="Название" className="w-full bg-[#27272a] rounded-xl p-3 outline-none min-w-0 text-zinc-200" value={newExercise.title} onChange={(e) => setNewExercise({...newExercise, title: e.target.value})} required />

            <div className="grid grid-cols-2 gap-3">
              <select className="w-full bg-[#27272a] rounded-xl p-3 outline-none min-w-0 text-zinc-200" value={newExercise.unit} onChange={(e) => setNewExercise({...newExercise, unit: e.target.value, targets: e.target.value === "steps" ? "7000" : e.target.value === "sec" ? "30,30,30" : "10,10,10"})}>
                <option value="reps">Повторы</option>
                <option value="sec">Секунды</option>
                <option value="steps">Шаги</option>
              </select>

              <input type="text" placeholder="10,10,10" className="w-full bg-[#27272a] rounded-xl p-3 outline-none min-w-0 text-amber-400 font-bold" value={newExercise.targets} onChange={(e) => setNewExercise({...newExercise, targets: e.target.value})} required />
            </div>

            <button type="submit" className="fast-touch w-full bg-amber-600 active:bg-amber-700 text-white rounded-xl p-4 font-bold transition-transform active:scale-95">
              Добавить упражнение
            </button>

            <p className="text-xs text-zinc-500 leading-relaxed">
              Цель пишется через запятую: 10,10,10 = три подхода. Для планки: 30,30,30. Для шагов: 7000.
            </p>
          </form>

          <div className="bg-[#18181b] rounded-3xl p-5 border border-zinc-800/50">
            <button onClick={applyTemplateToCurrentDay} className="fast-touch w-full bg-[#27272a] active:bg-zinc-700 text-white rounded-xl p-4 font-bold">
              Применить шаблон к этому дню
            </button>
            <p className="text-xs text-zinc-500 leading-relaxed mt-3">
              Новые даты получают этот шаблон автоматически. Уже открытые дни не меняются, пока ты сам не нажмёшь эту кнопку.
            </p>
          </div>

          <div className="space-y-2">
            <h2 className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Шаблон упражнений ({template.length})</h2>

            {template.map(ex => (
              <div key={ex.id} className="bg-[#18181b] rounded-xl p-3 border border-zinc-800/30">
                {editingExerciseId === ex.id ? (
                  <div className="space-y-3">
                    <input type="text" className="w-full bg-[#27272a] rounded-xl p-3 outline-none text-zinc-200" value={editingExercise.title} onChange={(e) => setEditingExercise({...editingExercise, title: e.target.value})} />

                    <div className="grid grid-cols-2 gap-3">
                      <select className="w-full bg-[#27272a] rounded-xl p-3 outline-none text-zinc-200" value={editingExercise.unit} onChange={(e) => setEditingExercise({...editingExercise, unit: e.target.value})}>
                        <option value="reps">Повторы</option>
                        <option value="sec">Секунды</option>
                        <option value="steps">Шаги</option>
                      </select>

                      <input type="text" className="w-full bg-[#27272a] rounded-xl p-3 outline-none text-amber-400 font-bold" value={editingExercise.targetsText} onChange={(e) => setEditingExercise({...editingExercise, targetsText: e.target.value})} />
                    </div>

                    <div className="grid grid-cols-2 gap-2">
                      <button onClick={saveEditExercise} type="button" className="fast-touch bg-emerald-600 rounded-xl p-3 font-bold">Сохранить</button>
                      <button onClick={cancelEdit} type="button" className="fast-touch bg-[#27272a] rounded-xl p-3 font-bold">Отмена</button>
                    </div>
                  </div>
                ) : (
                  <div className="flex justify-between items-center gap-3">
                    <div className="flex-1 min-w-0">
                      <span className="text-sm font-medium truncate block">{ex.title}</span>
                      <div className="flex gap-2 text-[10px] font-bold uppercase mt-1 flex-wrap">
                        <span className={colorClass(unitColor(ex.unit), "text")}>{ex.targets.join(" + ")} {unitLabel(ex.unit)}</span>
                      </div>
                    </div>

                    <button onClick={() => startEditExercise(ex)} className="fast-touch text-zinc-600 active:text-amber-400 p-2 bg-transparent">
                      <IconEdit className="w-5 h-5" />
                    </button>

                    <button onClick={() => deleteExercise(ex.id)} className="fast-touch text-zinc-800 active:text-red-500 p-2 bg-transparent">
                      <IconTrash className="w-5 h-5" />
                    </button>
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
