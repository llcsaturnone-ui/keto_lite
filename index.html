<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#09090b">
  <title>Трекер питания и ритма</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    html {
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    body { 
      background-color: #000; 
      margin: 0; 
      padding: 0; 
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      overscroll-behavior-y: none; 
      -webkit-tap-highlight-color: transparent;
      overflow: hidden; 
    }

    #root {
      height: 100%;
      overflow: hidden;
    }

    ::-webkit-scrollbar { width: 0px; background: transparent; }

    .app-shell {
      height: 100%;
      min-height: 100%;
    }

    .app-scroll {
      overflow-anchor: none;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }

    .safe-pb {
      padding-bottom: max(16px, env(safe-area-inset-bottom));
    }

    .nav-safe {
      padding-bottom: max(16px, env(safe-area-inset-bottom));
    }

    .fast-touch { touch-action: manipulation; }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;

    const resetPageOffset = () => {
      requestAnimationFrame(() => {
        window.scrollTo(0, 0);
        document.documentElement.scrollTop = 0;
        document.body.scrollTop = 0;
      });
    };

    window.addEventListener("focusout", () => {
      setTimeout(resetPageOffset, 90);
    });

    window.visualViewport?.addEventListener("resize", () => {
      const activeTag = document.activeElement?.tagName;
      const keyboardTarget = ["INPUT", "TEXTAREA", "SELECT"].includes(activeTag);
      if (!keyboardTarget) {
        setTimeout(resetPageOffset, 90);
      }
    });

    window.addEventListener("orientationchange", () => {
      setTimeout(resetPageOffset, 250);
    });

    const IconPlus = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14m-7-7h14"/></svg>;
    const IconBook = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>;
    const IconCalendar = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
    const IconChevronLeft = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>;
    const IconChevronRight = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>;
    const IconTrash = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6"/></svg>;
    const IconTarget = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
    const IconEdit = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>;
    const IconDownload = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>;
    const IconActivity = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>;
    const IconFootprints = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 16v-2.4C4 11.6 5.6 10 7.6 10H8c1.1 0 2 .9 2 2v4c0 1.7-1.3 3-3 3s-3-1.3-3-3Z"/><path d="M14 8V5.6C14 3.6 15.6 2 17.6 2H18c1.1 0 2 .9 2 2v4c0 1.7-1.3 3-3 3s-3-1.3-3-3Z"/><path d="M8 10V7"/><path d="M18 2v3"/></svg>;
    const IconDumbbell = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6.5 6.5 11 11"/><path d="m21 21-1-1"/><path d="m3 3 1 1"/><path d="m18 22 4-4"/><path d="m2 6 4-4"/><path d="m3 10 7-7"/><path d="m14 21 7-7"/></svg>;
    const IconCheckCircle = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="10"/></svg>;
    const IconMoon = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 7 9 9 0 1 1-9-7Z"/></svg>;
    const IconFlame = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 17c1.4 0 2.8-1 2.8-2.7 0-1.5-1-2.3-2.1-3.2C10.4 10 9 8.8 9 6.5 9 4.8 10 3.5 11.1 2.7c.3 2.1 1.7 3.4 3 4.7 1.8 1.8 3.4 3.4 3.4 6.1A6.5 6.5 0 1 1 5.7 9.8c0 1.8.8 3.1 2.8 4.7Z"/></svg>;
    const IconDatabase = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="8" ry="3"/><path d="M4 5v6c0 1.7 3.6 3 8 3s8-1.3 8-3V5"/><path d="M4 11v6c0 1.7 3.6 3 8 3s8-1.3 8-3v-6"/></svg>;

    const STORAGE = {
      goals: "diet_goals_v2",
      foods: "diet_foods_v2",
      logs: "diet_logs_v2",
      wellness: "diet_wellness_v1"
    };

    const getLocalDateString = (dateObj) => {
      const year = dateObj.getFullYear();
      const month = String(dateObj.getMonth() + 1).padStart(2, "0");
      const day = String(dateObj.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    };

    const parseLocalDate = (dateString) => {
      const [year, month, day] = String(dateString).split("-").map(Number);
      return new Date(year, month - 1, day);
    };

    const displayDate = (dateString) => {
      const d = parseLocalDate(dateString);
      const todayStr = getLocalDateString(new Date());

      if (dateString === todayStr) return "Сегодня";

      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      if (dateString === getLocalDateString(yesterday)) return "Вчера";

      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      if (dateString === getLocalDateString(tomorrow)) return "Завтра";

      return d.toLocaleDateString("ru-RU", { day: "numeric", month: "long" });
    };

    const num = (value) => {
      const parsed = parseFloat(String(value ?? "").replace(",", "."));
      return Number.isFinite(parsed) ? parsed : 0;
    };

    const nonNegative = (value) => Math.max(0, num(value));

    const round = (value, digits = 1) => {
      const k = Math.pow(10, digits);
      return Math.round(num(value) * k) / k;
    };

    const pct = (current, target) => {
      if (!num(target)) return 0;
      return Math.min(100, Math.max(0, (num(current) / num(target)) * 100));
    };

    const today = getLocalDateString(new Date());

    const makeId = () => `${Date.now()}_${Math.random().toString(36).slice(2, 10)}`;

    const defaultGoals = {
      calories: 2000,
      protein: 160,
      fat: 65,
      carbs: 135
    };

    const defaultFoods = [
      { id: "1", name: "Куриное филе", calories: 113, protein: 23.6, fat: 1.9, carbs: 0 },
      { id: "2", name: "Гречка варёная", calories: 132, protein: 4.5, fat: 1.3, carbs: 25 },
      { id: "3", name: "Яйцо варёное", calories: 155, protein: 12.6, fat: 10.6, carbs: 1.1 },
      { id: "4", name: "Творог 5%", calories: 121, protein: 17, fat: 5, carbs: 1.8 },
      { id: "5", name: "Огурец", calories: 15, protein: 0.8, fat: 0.1, carbs: 2.8 }
    ];

    const defaultHabits = [
      { id: "water", name: "Вода" },
      { id: "sleep", name: "Сон 7+ ч" },
      { id: "stretch", name: "Растяжка" }
    ];

    const prayerList = [
      { id: "fajr", label: "Фаджр" },
      { id: "dhuhr", label: "Зухр" },
      { id: "asr", label: "Аср" },
      { id: "maghrib", label: "Магриб" },
      { id: "isha", label: "Иша" }
    ];

    const workoutList = [
      { id: "pushups", label: "Отжимания", unit: "раз" },
      { id: "squats", label: "Приседания", unit: "раз" },
      { id: "pullups", label: "Подтягивания", unit: "раз" },
      { id: "plank", label: "Планка", unit: "сек" },
      { id: "abs", label: "Пресс", unit: "раз" }
    ];

    const defaultWellness = {
      stepGoal: 10000,
      habits: defaultHabits,
      days: {}
    };

    const emptyPrayers = () => prayerList.reduce((acc, prayer) => {
      acc[prayer.id] = { prayer: false, dhikr: false };
      return acc;
    }, {});

    const emptyWorkouts = () => workoutList.reduce((acc, exercise) => {
      acc[exercise.id] = 0;
      return acc;
    }, {});

    function makeEmptyWellnessDay() {
      return {
        steps: 0,
        habits: {},
        prayers: emptyPrayers(),
        workouts: emptyWorkouts()
      };
    }


    function normalizeFood(food) {
      if (!food || typeof food !== "object") return null;

      const id = String(food.id || makeId());
      const name = String(food.name || food.title || food.product || food["название"] || food["продукт"] || "").trim();

      if (!name) return null;

      return {
        id,
        name,
        calories: nonNegative(food.calories ?? food.kcal ?? food["ккал"] ?? food["калории"] ?? food["калорийность"]),
        protein: nonNegative(food.protein ?? food.proteins ?? food["белки"] ?? food["белок"] ?? food["б"]),
        fat: nonNegative(food.fat ?? food.fats ?? food["жиры"] ?? food["жир"] ?? food["ж"]),
        carbs: nonNegative(food.carbs ?? food.carbohydrates ?? food["углеводы"] ?? food["углевод"] ?? food["у"])
      };
    }

    function normalizeGoals(value) {
      return {
        calories: nonNegative(value?.calories ?? defaultGoals.calories),
        protein: nonNegative(value?.protein ?? defaultGoals.protein),
        fat: nonNegative(value?.fat ?? defaultGoals.fat),
        carbs: nonNegative(value?.carbs ?? defaultGoals.carbs)
      };
    }

    function normalizeFoods(value) {
      if (!Array.isArray(value)) return defaultFoods;

      const usedIds = new Set();
      const normalized = value.map(normalizeFood).filter(Boolean).map(food => {
        let id = String(food.id || makeId());

        if (usedIds.has(id)) {
          id = makeId();
        }

        usedIds.add(id);
        return { ...food, id };
      });

      return normalized.length ? normalized : defaultFoods;
    }

    function normalizeLogs(value) {
      return value && typeof value === "object" && !Array.isArray(value) ? value : {};
    }

    function normalizeHabit(habit) {
      if (!habit || typeof habit !== "object") return null;

      const name = String(habit.name || habit.title || "").trim();
      if (!name) return null;

      return {
        id: String(habit.id || makeId()),
        name
      };
    }

    function normalizePrayers(value) {
      const prayers = emptyPrayers();

      if (!value || typeof value !== "object" || Array.isArray(value)) return prayers;

      prayerList.forEach(prayer => {
        const raw = value[prayer.id];

        if (typeof raw === "boolean") {
          prayers[prayer.id] = { prayer: raw, dhikr: false };
          return;
        }

        if (raw && typeof raw === "object") {
          prayers[prayer.id] = {
            prayer: Boolean(raw.prayer ?? raw.done ?? raw.namaz),
            dhikr: Boolean(raw.dhikr ?? raw.zikr ?? raw.suohazh)
          };
        }
      });

      return prayers;
    }

    function normalizeWorkouts(value) {
      const workouts = emptyWorkouts();

      if (Array.isArray(value)) {
        value.forEach(workout => {
          const name = String(workout?.name || workout?.type || "").toLowerCase();
          const rawValue = nonNegative(workout?.count ?? workout?.reps ?? workout?.value ?? workout?.seconds ?? workout?.minutes);

          if (name.includes("отжим")) workouts.pushups += Math.round(rawValue);
          if (name.includes("присед")) workouts.squats += Math.round(rawValue);
          if (name.includes("подтяг")) workouts.pullups += Math.round(rawValue);
          if (name.includes("план")) workouts.plank += Math.round(nonNegative(workout?.seconds ?? num(workout?.minutes) * 60));
          if (name.includes("пресс")) workouts.abs += Math.round(rawValue);
        });

        return workouts;
      }

      if (!value || typeof value !== "object") return workouts;

      workoutList.forEach(exercise => {
        workouts[exercise.id] = Math.round(nonNegative(value[exercise.id]));
      });

      return workouts;
    }

    function normalizeWellnessDay(value) {
      const empty = makeEmptyWellnessDay();
      if (!value || typeof value !== "object" || Array.isArray(value)) return empty;

      const habits = {};
      if (value.habits && typeof value.habits === "object" && !Array.isArray(value.habits)) {
        Object.entries(value.habits).forEach(([id, done]) => {
          habits[String(id)] = Boolean(done);
        });
      }

      return {
        steps: Math.round(nonNegative(value.steps)),
        habits,
        prayers: normalizePrayers(value.prayers),
        workouts: normalizeWorkouts(value.workouts)
      };
    }

    function normalizeWellness(value) {
      const usedIds = new Set();
      const habitsSource = Array.isArray(value?.habits) ? value.habits : defaultHabits;
      const habits = habitsSource.map(normalizeHabit).filter(Boolean).map(habit => {
        let id = habit.id;
        if (usedIds.has(id)) id = makeId();
        usedIds.add(id);
        return { ...habit, id };
      });

      const days = {};
      if (value?.days && typeof value.days === "object" && !Array.isArray(value.days)) {
        Object.entries(value.days).forEach(([date, day]) => {
          if (/^\d{4}-\d{2}-\d{2}$/.test(date)) days[date] = normalizeWellnessDay(day);
        });
      }

      return {
        stepGoal: value?.stepGoal === undefined || value?.stepGoal === null || value?.stepGoal === "" ? defaultWellness.stepGoal : Math.round(nonNegative(value.stepGoal)),
        habits: habits.length ? habits : defaultHabits,
        days
      };
    }

    function safeLoad(key, fallback, normalizer = (v) => v) {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return fallback;
        return normalizer(JSON.parse(raw));
      } catch {
        return fallback;
      }
    }

    function safeSave(key, value) {
      try {
        localStorage.setItem(key, JSON.stringify(value));
      } catch {
        alert("Не удалось сохранить данные в память браузера. Скачай backup, чтобы не потерять прогресс.");
      }
    }


    function ProgressBar({ value, color = "emerald" }) {
      const colorClass = {
        emerald: "bg-emerald-500",
        indigo: "bg-indigo-500",
        amber: "bg-amber-500",
        sky: "bg-sky-500",
        rose: "bg-rose-500"
      }[color];

      return (
        <div className="h-2 w-full bg-zinc-950 rounded-full overflow-hidden">
          <div className={`h-full ${colorClass} transition-all duration-500`} style={{ width: `${value}%` }} />
        </div>
      );
    }

    function MacroCard({ label, value, target, color, unit = "г" }) {
      const left = num(target) - num(value);
      const over = left < 0;
      const usedColor = over ? "rose" : color;

      const textClass = {
        emerald: "text-emerald-400",
        indigo: "text-indigo-400",
        amber: "text-amber-400",
        sky: "text-sky-400",
        rose: "text-rose-400"
      }[usedColor];

      return (
        <div className="bg-[#18181b] border border-zinc-800/50 rounded-2xl p-3">
          <div className="flex justify-between items-center mb-2">
            <span className="text-[9px] text-zinc-500 font-black uppercase">{label}</span>
            <span className={`text-[10px] font-black ${over ? "text-rose-400" : "text-zinc-400"}`}>
              {over ? "+" : ""}{round(Math.abs(left), 0)} {unit}
            </span>
          </div>

          <div className={`font-black text-lg ${textClass}`}>
            {round(value, unit === "ккал" ? 0 : 1)}
            <span className="text-[10px] text-zinc-600 ml-1">/ {target}</span>
          </div>

          <div className="mt-2">
            <ProgressBar value={pct(value, target)} color={usedColor} />
          </div>
        </div>
      );
    }

    function StatCard({ icon, label, value, sub, color = "emerald", progress = null }) {
      const colorClass = {
        emerald: "text-emerald-400",
        indigo: "text-indigo-400",
        amber: "text-amber-400",
        sky: "text-sky-400",
        rose: "text-rose-400"
      }[color];

      return (
        <div className="bg-[#18181b] rounded-2xl p-4 border border-zinc-800/50">
          <div className="flex items-center justify-between mb-3">
            <div className={colorClass}>{icon}</div>
            <span className={`text-[10px] font-black ${colorClass}`}>{label}</span>
          </div>

          <div className="text-2xl font-black leading-none">{value}</div>
          <div className="text-[9px] text-zinc-500 font-bold uppercase mt-2 truncate">{sub}</div>

          {progress !== null && (
            <div className="mt-3">
              <ProgressBar value={progress} color={color} />
            </div>
          )}
        </div>
      );
    }

    function InputBox({ label, value, setValue, color, placeholder = "", type = "number" }) {
      return (
        <div>
          <span className="text-[9px] text-zinc-500 font-bold block mb-1">{label}</span>
          <input
            type={type}
            inputMode={type === "number" ? "decimal" : "text"}
            min={type === "number" ? "0" : undefined}
            className={`w-full bg-[#27272a] rounded-xl p-3 ${color} font-bold outline-none min-w-0`}
            value={value}
            onChange={(e) => setValue(e.target.value)}
            placeholder={placeholder}
          />
        </div>
      );
    }

    function pick(obj, keys) {
      for (const key of keys) {
        if (obj && obj[key] !== undefined && obj[key] !== null && obj[key] !== "") return obj[key];
      }
      return null;
    }

    function parseProductJson(rawText) {
      const raw = String(rawText || "").trim();
      if (!raw) return null;

      let jsonText = raw;

      const fenced = raw.match(/```(?:json)?\s*([\s\S]*?)```/i);
      if (fenced) jsonText = fenced[1].trim();

      const firstObj = jsonText.indexOf("{");
      const lastObj = jsonText.lastIndexOf("}");
      const firstArr = jsonText.indexOf("[");
      const lastArr = jsonText.lastIndexOf("]");

      try {
        if (firstObj !== -1 && lastObj !== -1 && (firstArr === -1 || firstObj < firstArr)) {
          jsonText = jsonText.slice(firstObj, lastObj + 1);
        } else if (firstArr !== -1 && lastArr !== -1) {
          jsonText = jsonText.slice(firstArr, lastArr + 1);
        }

        const parsed = JSON.parse(jsonText);
        const obj = Array.isArray(parsed) ? parsed[0] : parsed;
        if (!obj || typeof obj !== "object") return null;

        const source = obj.per100g || obj.per_100g || obj.per100 || obj.nutrition_per_100g || obj.nutrition || obj.macros || obj;
        const name = pick(obj, ["name", "title", "product", "название", "продукт"]) || pick(source, ["name", "title", "product", "название", "продукт"]) || "Новый продукт";
        const calories = pick(source, ["calories", "kcal", "ккал", "калории", "калорийность"]);
        const protein = pick(source, ["protein", "proteins", "белок", "белки", "б"]);
        const fat = pick(source, ["fat", "fats", "жир", "жиры", "ж"]);
        const carbs = pick(source, ["carbs", "carbohydrates", "углеводы", "углевод", "у"]);

        if ([calories, protein, fat, carbs].some(v => v === null)) return null;

        return {
          name: String(name).trim(),
          calories: round(calories, 0),
          protein: round(protein, 1),
          fat: round(fat, 1),
          carbs: round(carbs, 1)
        };
      } catch {
        return null;
      }
    }


    function normalizeProductObjectForImport(obj) {
      if (!obj || typeof obj !== "object") return null;

      const source = obj.per100g || obj.per_100g || obj.per100 || obj.nutrition_per_100g || obj.nutrition || obj.macros || obj;
      const name = pick(obj, ["name", "title", "product", "название", "продукт"]) || pick(source, ["name", "title", "product", "название", "продукт"]) || "";
      const calories = pick(source, ["calories", "kcal", "ккал", "калории", "калорийность"]);
      const protein = pick(source, ["protein", "proteins", "белок", "белки", "б"]);
      const fat = pick(source, ["fat", "fats", "жир", "жиры", "ж"]);
      const carbs = pick(source, ["carbs", "carbohydrates", "углеводы", "углевод", "у"]);

      if (!name || [calories, protein, fat, carbs].some(v => v === null)) return null;

      return {
        name: String(name).trim(),
        calories: round(calories, 0),
        protein: round(protein, 1),
        fat: round(fat, 1),
        carbs: round(carbs, 1)
      };
    }

    function parseProductsJson(rawText) {
      const raw = String(rawText || "").trim();
      if (!raw) return [];

      let jsonText = raw;

      const fenced = raw.match(/```(?:json)?\s*([\s\S]*?)```/i);
      if (fenced) jsonText = fenced[1].trim();

      const firstObj = jsonText.indexOf("{");
      const lastObj = jsonText.lastIndexOf("}");
      const firstArr = jsonText.indexOf("[");
      const lastArr = jsonText.lastIndexOf("]");

      try {
        if (firstArr !== -1 && lastArr !== -1 && (firstObj === -1 || firstArr < firstObj)) {
          jsonText = jsonText.slice(firstArr, lastArr + 1);
        } else if (firstObj !== -1 && lastObj !== -1) {
          jsonText = jsonText.slice(firstObj, lastObj + 1);
        }

        const parsed = JSON.parse(jsonText);

        let list = [];
        if (Array.isArray(parsed)) {
          list = parsed;
        } else if (Array.isArray(parsed.products)) {
          list = parsed.products;
        } else if (Array.isArray(parsed.items)) {
          list = parsed.items;
        } else if (Array.isArray(parsed.foods)) {
          list = parsed.foods;
        } else {
          list = [parsed];
        }

        return list.map(normalizeProductObjectForImport).filter(Boolean);
      } catch {
        return [];
      }
    }

    function parseProductsFromText(rawText) {
      const jsonProducts = parseProductsJson(rawText);
      if (jsonProducts.length) return jsonProducts;

      const one = parseProductFromText(rawText);
      return one ? [one] : [];
    }

    function parseProductFromText(rawText) {
      const jsonProduct = parseProductJson(rawText);
      if (jsonProduct) return jsonProduct;

      const raw = String(rawText || "").trim();
      if (!raw) return null;

      const text = raw
        .replace(/\*\*/g, "")
        .replace(/≈/g, " ")
        .replace(/,/g, ".")
        .replace(/\u00a0/g, " ");

      const lines = text
        .split(/\n+/)
        .map(line => line.replace(/[|:]/g, " ").replace(/\s+/g, " ").trim())
        .filter(Boolean);

      let name = "";
      const banned = /^(на\s+\d+|на\s+100|показатель|значение|калории|белки|белок|жиры|углеводы|в\s+базу|для\s+приложения|таблица|итого)/i;

      for (const line of lines) {
        const clean = line
          .replace(/^#+\s*/, "")
          .replace(/^\-+\s*/, "")
          .replace(/^(продукт|название)\s+/i, "")
          .trim();

        if (
          clean.length >= 3 &&
          clean.length <= 60 &&
          !banned.test(clean) &&
          !/\d+\s*(ккал|г|гр|%)/i.test(clean) &&
          !/(можешь|добавить|значение|примерно|лучше|занеси|на 100)/i.test(clean)
        ) {
          name = clean;
          break;
        }
      }

      if (!name) {
        const nameMatch = text.match(/(?:продукт|название)\s*[:\-]\s*([^\n]+)/i);
        if (nameMatch) name = nameMatch[1].trim();
      }

      if (!name) name = "Новый продукт";

      let working = text;

      const per100Match = text.match(/на\s*100\s*г([\s\S]*?)(?:на\s*1|на\s*одн|в\s+базу|$)/i);
      if (per100Match) working = per100Match[1];

      const compact = text.match(/(\d+(?:\.\d+)?)\s*ккал\s*\/?\s*б\s*(\d+(?:\.\d+)?)\s*\/?\s*ж\s*(\d+(?:\.\d+)?)\s*\/?\s*у\s*(\d+(?:\.\d+)?)/i);
      if (compact) {
        return {
          name,
          calories: round(compact[1], 0),
          protein: round(compact[2], 1),
          fat: round(compact[3], 1),
          carbs: round(compact[4], 1)
        };
      }

      function findNumber(labelRegex, source) {
        const re = new RegExp(labelRegex + "\\s*[:\\-]?\\s*(\\d+(?:\\.\\d+)?)", "i");
        const m = source.match(re);
        if (m) return num(m[1]);

        const reReverse = new RegExp("(\\d+(?:\\.\\d+)?)\\s*(?:ккал|г|гр)?\\s*" + labelRegex, "i");
        const m2 = source.match(reReverse);
        if (m2) return num(m2[1]);

        return null;
      }

      let calories = findNumber("(?:калории|ккал|калорийность)", working);
      let protein = findNumber("(?:белки|белок|б\\b)", working);
      let fat = findNumber("(?:жиры|жир|ж\\b)", working);
      let carbs = findNumber("(?:углеводы|углевод|у\\b)", working);

      if ([calories, protein, fat, carbs].some(v => v === null)) {
        const allNums = working.match(/\d+(?:\.\d+)?/g)?.map(num) || [];
        if (allNums.length >= 4) {
          calories = calories ?? allNums[0];
          protein = protein ?? allNums[1];
          fat = fat ?? allNums[2];
          carbs = carbs ?? allNums[3];
        }
      }

      if ([calories, protein, fat, carbs].some(v => v === null)) return null;

      return {
        name,
        calories: round(calories, 0),
        protein: round(protein, 1),
        fat: round(fat, 1),
        carbs: round(carbs, 1)
      };
    }

    function App() {
      const mainRef = useRef(null);

      const [goals, setGoals] = useState(() => safeLoad(STORAGE.goals, defaultGoals, normalizeGoals));
      const [foods, setFoods] = useState(() => safeLoad(STORAGE.foods, defaultFoods, normalizeFoods));
      const [dailyLogs, setDailyLogs] = useState(() => safeLoad(STORAGE.logs, {}, normalizeLogs));
      const [wellness, setWellness] = useState(() => safeLoad(STORAGE.wellness, defaultWellness, normalizeWellness));
      const [currentDate, setCurrentDate] = useState(today);
      const [activeTab, setActiveTab] = useState("diary");

      const [selectedFoodId, setSelectedFoodId] = useState("");
      const [gramsInput, setGramsInput] = useState("");

      const [newFood, setNewFood] = useState({ name: "", calories: "", protein: "", fat: "", carbs: "" });
      const [pasteText, setPasteText] = useState("");
      const [editingFoodId, setEditingFoodId] = useState(null);
      const [editingFood, setEditingFood] = useState(null);

      const [editingLogId, setEditingLogId] = useState(null);
      const [editingLog, setEditingLog] = useState({ foodId: "", grams: "" });
      const [newHabitName, setNewHabitName] = useState("");

      useEffect(() => safeSave(STORAGE.goals, goals), [goals]);
      useEffect(() => safeSave(STORAGE.foods, foods), [foods]);
      useEffect(() => safeSave(STORAGE.logs, dailyLogs), [dailyLogs]);
      useEffect(() => safeSave(STORAGE.wellness, wellness), [wellness]);

      useEffect(() => {
        if (mainRef.current) mainRef.current.scrollTop = 0;
      }, [activeTab, currentDate]);

      const currentDayLogs = dailyLogs[currentDate] || [];
      const currentWellnessDay = useMemo(() => normalizeWellnessDay(wellness.days?.[currentDate]), [wellness.days, currentDate]);

      const totals = useMemo(() => {
        return currentDayLogs.reduce((sum, log) => {
          sum.calories += num(log.totalCalories);
          sum.protein += num(log.totalProtein);
          sum.fat += num(log.totalFat);
          sum.carbs += num(log.totalCarbs);
          return sum;
        }, { calories: 0, protein: 0, fat: 0, carbs: 0 });
      }, [currentDayLogs]);

      const remainingCalories = num(goals.calories) - totals.calories;
      const habitDoneCount = wellness.habits.filter(habit => currentWellnessDay.habits[habit.id]).length;
      const prayerDoneCount = prayerList.filter(prayer => currentWellnessDay.prayers[prayer.id]?.prayer).length;
      const dhikrDoneCount = prayerList.filter(prayer => currentWellnessDay.prayers[prayer.id]?.dhikr).length;
      const workoutDoneCount = workoutList.filter(exercise => num(currentWellnessDay.workouts[exercise.id]) > 0).length;
      const stepProgress = pct(currentWellnessDay.steps, wellness.stepGoal);
      const activeTitle = activeTab === "diary" ? "Дневник" : activeTab === "wellness" ? "Ритм дня" : "База и цели";
      const loggedFoodDaysCount = Object.values(dailyLogs).filter(day => Array.isArray(day) && day.length > 0).length;
      const rhythmDaysCount = Object.keys(wellness.days || {}).length;
      const headerValue = activeTab === "wellness" ? `${Math.round(stepProgress)}%` : activeTab === "directory" ? foods.length : Math.round(remainingCalories);
      const headerLabel = activeTab === "wellness" ? "цель шагов" : activeTab === "directory" ? "продуктов" : "ккал осталось";
      const headerColor = activeTab === "wellness" ? "text-sky-400" : activeTab === "directory" ? "text-indigo-400" : (remainingCalories < 0 ? "text-rose-400" : "text-emerald-400");

      function calcFood(food, gramsValue) {
        const grams = nonNegative(gramsValue);
        return {
          calories: Math.round((grams / 100) * num(food.calories)),
          protein: round((grams / 100) * num(food.protein), 1),
          fat: round((grams / 100) * num(food.fat), 1),
          carbs: round((grams / 100) * num(food.carbs), 1)
        };
      }

      function addOrUpdateFood(product) {
        const normalized = normalizeFood(product);

        if (!normalized) {
          alert("Не получилось добавить продукт: проверь название и КБЖУ.");
          return false;
        }

        const existing = foods.find(f => f.name.trim().toLowerCase() === normalized.name.trim().toLowerCase());

        if (existing) {
          const shouldUpdate = confirm(`Продукт «${normalized.name}» уже есть в базе. Обновить его КБЖУ?`);
          if (!shouldUpdate) return false;

          setFoods(prev => prev.map(f => f.id === existing.id ? { ...normalized, id: existing.id } : f));
          return true;
        }

        setFoods(prev => [...prev, { ...normalized, id: normalized.id || makeId() }]);
        return true;
      }

      function addLog(e) {
        e.preventDefault();

        const food = foods.find(f => f.id === selectedFoodId);
        const grams = nonNegative(gramsInput);

        if (!food || grams <= 0) return;

        const calculated = calcFood(food, grams);

        const newLog = {
          id: makeId(),
          foodId: food.id,
          foodName: food.name,
          grams,
          totalCalories: calculated.calories,
          totalProtein: calculated.protein,
          totalFat: calculated.fat,
          totalCarbs: calculated.carbs
        };

        setDailyLogs(prev => ({
          ...prev,
          [currentDate]: [...(prev[currentDate] || []), newLog]
        }));

        setSelectedFoodId("");
        setGramsInput("");
      }

      function deleteLog(logId) {
        setDailyLogs(prev => ({
          ...prev,
          [currentDate]: (prev[currentDate] || []).filter(l => l.id !== logId)
        }));
      }

      function startEditLog(log) {
        const foodExists = foods.some(f => f.id === log.foodId);
        const fallbackFood = foods.find(f => f.name === log.foodName);

        setEditingLogId(log.id);
        setEditingLog({ foodId: foodExists ? log.foodId : (fallbackFood?.id || ""), grams: String(log.grams) });
      }

      function saveEditLog() {
        const food = foods.find(f => f.id === editingLog.foodId);
        const grams = nonNegative(editingLog.grams);

        if (!food || grams <= 0) return;

        const calculated = calcFood(food, grams);

        setDailyLogs(prev => ({
          ...prev,
          [currentDate]: (prev[currentDate] || []).map(log => log.id === editingLogId ? {
            ...log,
            foodId: food.id,
            foodName: food.name,
            grams,
            totalCalories: calculated.calories,
            totalProtein: calculated.protein,
            totalFat: calculated.fat,
            totalCarbs: calculated.carbs
          } : log)
        }));

        setEditingLogId(null);
        setEditingLog({ foodId: "", grams: "" });
      }

      function saveFood(e) {
        e.preventDefault();

        if (!newFood.name.trim()) return;

        const ok = addOrUpdateFood({
          name: newFood.name.trim(),
          calories: nonNegative(newFood.calories),
          protein: nonNegative(newFood.protein),
          fat: nonNegative(newFood.fat),
          carbs: nonNegative(newFood.carbs)
        });

        if (ok) setNewFood({ name: "", calories: "", protein: "", fat: "", carbs: "" });
      }

      function addProductFromPaste() {
        const parsedProducts = parseProductsFromText(pasteText);

        if (!parsedProducts.length) {
          alert("Не смог распознать. В тексте должны быть ккал, белки, жиры и углеводы на 100 г.");
          return;
        }

        let added = 0;

        parsedProducts.forEach(product => {
          const ok = addOrUpdateFood(product);
          if (ok) added += 1;
        });

        if (added > 0) {
          setPasteText("");
          alert(`Добавлено продуктов: ${added}`);
        }
      }

      function fillProductFromPaste() {
        const parsedProducts = parseProductsFromText(pasteText);
        const parsed = parsedProducts[0];

        if (!parsed) {
          alert("Не смог распознать. В тексте должны быть ккал, белки, жиры и углеводы на 100 г.");
          return;
        }

        setNewFood({
          name: parsed.name,
          calories: String(parsed.calories),
          protein: String(parsed.protein),
          fat: String(parsed.fat),
          carbs: String(parsed.carbs)
        });
      }

      function startEditFood(food) {
        setEditingFoodId(food.id);
        setEditingFood({ ...food });
      }

      function saveEditFood() {
        if (!editingFood?.name?.trim()) return;

        const newName = editingFood.name.trim();
        const duplicate = foods.find(f => f.id !== editingFoodId && f.name.trim().toLowerCase() === newName.toLowerCase());

        if (duplicate) {
          alert(`Продукт «${newName}» уже есть в базе. Выбери другое название или отредактируй существующий.`);
          return;
        }

        setFoods(prev => prev.map(f => f.id === editingFoodId ? {
          ...f,
          name: newName,
          calories: nonNegative(editingFood.calories),
          protein: nonNegative(editingFood.protein),
          fat: nonNegative(editingFood.fat),
          carbs: nonNegative(editingFood.carbs)
        } : f));

        setEditingFoodId(null);
        setEditingFood(null);
      }

      function deleteFood(foodId) {
        const food = foods.find(f => f.id === foodId);
        if (food && !confirm(`Удалить продукт «${food.name}» из базы?`)) return;

        setFoods(prev => prev.filter(f => f.id !== foodId));

        if (selectedFoodId === foodId) setSelectedFoodId("");
        if (editingLog.foodId === foodId) setEditingLog({ foodId: "", grams: editingLog.grams });
        if (editingFoodId === foodId) {
          setEditingFoodId(null);
          setEditingFood(null);
        }
      }

      function updateWellnessDay(updater) {
        setWellness(prev => {
          const day = normalizeWellnessDay(prev.days?.[currentDate]);
          const nextDay = normalizeWellnessDay(updater(day));

          return {
            ...prev,
            days: {
              ...(prev.days || {}),
              [currentDate]: nextDay
            }
          };
        });
      }

      function setSteps(value) {
        updateWellnessDay(day => ({
          ...day,
          steps: Math.round(nonNegative(value))
        }));
      }

      function setStepGoal(value) {
        setWellness(prev => ({
          ...prev,
          stepGoal: Math.round(nonNegative(value))
        }));
      }

      function toggleHabit(habitId) {
        updateWellnessDay(day => ({
          ...day,
          habits: {
            ...day.habits,
            [habitId]: !day.habits[habitId]
          }
        }));
      }

      function addHabit(e) {
        e.preventDefault();

        const name = newHabitName.trim();
        if (!name) return;

        const duplicate = wellness.habits.some(habit => habit.name.trim().toLowerCase() === name.toLowerCase());
        if (duplicate) {
          alert(`Привычка «${name}» уже есть.`);
          return;
        }

        setWellness(prev => ({
          ...prev,
          habits: [...prev.habits, { id: makeId(), name }]
        }));
        setNewHabitName("");
      }

      function deleteHabit(habitId) {
        const habit = wellness.habits.find(item => item.id === habitId);
        if (habit && !confirm(`Удалить привычку «${habit.name}»?`)) return;

        setWellness(prev => {
          const days = {};

          Object.entries(prev.days || {}).forEach(([date, day]) => {
            const normalizedDay = normalizeWellnessDay(day);
            const habits = { ...normalizedDay.habits };
            delete habits[habitId];
            days[date] = { ...normalizedDay, habits };
          });

          return {
            ...prev,
            habits: prev.habits.filter(item => item.id !== habitId),
            days
          };
        });
      }

      function togglePrayer(prayerId, field) {
        updateWellnessDay(day => ({
          ...day,
          prayers: {
            ...day.prayers,
            [prayerId]: {
              ...day.prayers[prayerId],
              [field]: !day.prayers[prayerId]?.[field]
            }
          }
        }));
      }

      function setWorkoutValue(exerciseId, value) {
        updateWellnessDay(day => ({
          ...day,
          workouts: {
            ...day.workouts,
            [exerciseId]: Math.round(nonNegative(value))
          }
        }));
      }

      function changeDate(offset) {
        const d = parseLocalDate(currentDate);
        d.setDate(d.getDate() + offset);
        setCurrentDate(getLocalDateString(d));
        setEditingLogId(null);
      }

      function exportBackup() {
        const data = {
          version: 9,
          goals,
          foods,
          dailyLogs,
          wellness,
          exportedAt: new Date().toISOString()
        };

        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `diet-tracker-backup-${currentDate}.json`;
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      }

      function importBackup(e) {
        const file = e.target.files?.[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = () => {
          try {
            const data = JSON.parse(reader.result);
            if (data.goals) setGoals(normalizeGoals(data.goals));
            if (data.foods) setFoods(normalizeFoods(data.foods));
            if (data.dailyLogs) setDailyLogs(normalizeLogs(data.dailyLogs));
            if (data.wellness) setWellness(normalizeWellness(data.wellness));
            alert("Backup восстановлен");
          } catch {
            alert("Не получилось прочитать backup");
          }
          e.target.value = "";
        };
        reader.readAsText(file);
      }

      function switchTab(tab) {
        setActiveTab(tab);
        setEditingFoodId(null);
        setEditingFood(null);
        setEditingLogId(null);
      }

      const selectedFood = foods.find(f => f.id === selectedFoodId);
      const preview = selectedFood && gramsInput ? calcFood(selectedFood, gramsInput) : null;

      return (
        <div className="app-shell flex flex-col w-full max-w-md mx-auto bg-[#09090b] text-zinc-100 font-sans shadow-2xl border-x border-zinc-900">
          <header className="shrink-0 pt-8 px-6 pb-4 bg-[#09090b] border-b border-zinc-800 flex justify-between items-center">
            <div>
              <h1 className="text-lg font-bold">{activeTitle}</h1>
              <p className="text-[10px] text-zinc-500 font-bold uppercase mt-1">Питание и ритм</p>
            </div>

            <div className="text-right">
              <div className={`text-lg font-black ${headerColor}`}>
                {headerValue}
              </div>
              <div className="text-[9px] text-zinc-500 font-bold uppercase">{headerLabel}</div>
            </div>
          </header>

          <main ref={mainRef} className="app-scroll flex-1 overflow-y-auto px-5 pt-4 pb-32">
            {activeTab === "diary" ? (
              <div className="space-y-6">
                <div className="flex items-center justify-between bg-[#18181b] rounded-2xl p-1 border border-zinc-800/50">
                  <button type="button" aria-label="Предыдущий день" onClick={() => changeDate(-1)} className="fast-touch p-3 text-zinc-400 bg-transparent active:text-zinc-200">
                    <IconChevronLeft className="w-5 h-5" />
                  </button>

                  <button type="button" aria-label="Сегодня" onClick={() => { setCurrentDate(today); setEditingLogId(null); }} className="fast-touch bg-transparent px-3 py-2">
                    <div className="font-bold text-sm text-zinc-200">{displayDate(currentDate)}</div>
                    <div className="text-[9px] text-zinc-600 font-bold uppercase">{currentDate}</div>
                  </button>

                  <button type="button" aria-label="Следующий день" onClick={() => changeDate(1)} className="fast-touch p-3 text-zinc-400 bg-transparent active:text-zinc-200">
                    <IconChevronRight className="w-5 h-5" />
                  </button>
                </div>

                <div className="grid grid-cols-2 gap-3">
                  <StatCard
                    icon={<IconFlame className="w-5 h-5" />}
                    label="Ккал"
                    value={Math.round(totals.calories)}
                    sub={`${remainingCalories < 0 ? "перебор" : "осталось"} ${Math.round(Math.abs(remainingCalories))}`}
                    color={remainingCalories < 0 ? "rose" : "emerald"}
                    progress={pct(totals.calories, goals.calories)}
                  />

                  <StatCard
                    icon={<IconActivity className="w-5 h-5" />}
                    label="Белок"
                    value={round(totals.protein, 1)}
                    sub={`/ ${goals.protein} г`}
                    color="indigo"
                    progress={pct(totals.protein, goals.protein)}
                  />

                  <StatCard
                    icon={<IconTarget className="w-5 h-5" />}
                    label="Жиры"
                    value={round(totals.fat, 1)}
                    sub={`/ ${goals.fat} г`}
                    color="amber"
                    progress={pct(totals.fat, goals.fat)}
                  />

                  <StatCard
                    icon={<IconDatabase className="w-5 h-5" />}
                    label="Углев."
                    value={round(totals.carbs, 1)}
                    sub={`/ ${goals.carbs} г`}
                    color="sky"
                    progress={pct(totals.carbs, goals.carbs)}
                  />
                </div>

                <form onSubmit={addLog} className="bg-[#18181b] rounded-3xl p-5 border border-zinc-800/50 space-y-3">
                  <h2 className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest flex items-center gap-2">
                    <IconPlus className="w-4 h-4" /> Добавить еду
                  </h2>

                  <select
                    className="w-full bg-[#27272a] rounded-2xl p-4 outline-none appearance-none text-zinc-200"
                    value={selectedFoodId}
                    onChange={(e) => setSelectedFoodId(e.target.value)}
                    required
                  >
                    <option value="" disabled className="text-zinc-500">Что съели?</option>
                    {foods.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
                  </select>

                  <div className="flex gap-3">
                    <input
                      type="number"
                      inputMode="decimal"
                      min="0"
                      placeholder="Граммы"
                      className="flex-1 bg-[#27272a] rounded-2xl p-4 outline-none min-w-0 text-zinc-200"
                      value={gramsInput}
                      onChange={(e) => setGramsInput(e.target.value)}
                      required
                    />
                    <button type="submit" aria-label="Добавить еду" className="w-14 shrink-0 bg-emerald-600 rounded-2xl flex items-center justify-center fast-touch active:scale-95 transition-transform">
                      <IconPlus className="w-6 h-6 text-white" />
                    </button>
                  </div>

                  {preview && (

          </main>

          <nav className="fixed left-1/2 bottom-0 -translate-x-1/2 w-full max-w-md bg-[#18181b] border-t border-zinc-800 flex justify-around pt-2 nav-safe z-50">
            <button type="button" onClick={() => switchTab("diary")} className={`fast-touch flex-1 flex flex-col items-center py-2 transition-all bg-transparent ${activeTab === "diary" ? "text-emerald-400" : "text-zinc-600 active:text-zinc-400"}`}>
              <IconCalendar className="w-6 h-6" />
              <span className="text-[9px] font-bold mt-1 uppercase">Дневник</span>
            </button>

            <button type="button" onClick={() => switchTab("wellness")} className={`fast-touch flex-1 flex flex-col items-center py-2 transition-all bg-transparent ${activeTab === "wellness" ? "text-sky-400" : "text-zinc-600 active:text-zinc-400"}`}>
              <IconActivity className="w-6 h-6" />
              <span className="text-[9px] font-bold mt-1 uppercase">Ритм</span>
            </button>

            <button type="button" onClick={() => switchTab("directory")} className={`fast-touch flex-1 flex flex-col items-center py-2 transition-all bg-transparent ${activeTab === "directory" ? "text-indigo-400" : "text-zinc-600 active:text-zinc-400"}`}>
              <IconBook className="w-6 h-6" />
              <span className="text-[9px] font-bold mt-1 uppercase">База</span>
            </button>
          </nav>
        </div>
      );
    }

    function SmallMacro({ color, value, label }) {
      return (
        <div className="text-center bg-zinc-900 rounded-xl p-2">
          <div className={`${color} font-black text-sm`}>{value}</div>
          <div className="text-[8px] text-zinc-500 font-bold uppercase">{label}</div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
