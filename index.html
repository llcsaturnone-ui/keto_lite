<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#020617" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="КБЖУ" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
  <title>КБЖУ + Тренировки</title>
</head>
<body>
  <header class="app-header">
    <div class="container header-row">
      <div>
        <div class="eyebrow">КБЖУ + тренировки</div>
        <h1 id="appTitle">Майский режим</h1>
      </div>
      <input id="dateInput" class="date-input" type="date" />
    </div>
  </header>

  <main class="container main">
    <section id="screenHome"></section>
    <section id="screenAdd" class="hidden"></section>
    <section id="screenProducts" class="hidden"></section>
    <section id="screenSettings" class="hidden"></section>
  </main>

  <nav class="bottom-nav">
    <div class="container nav-grid">
      <button class="nav-btn active" data-tab="home">Главная</button>
      <button class="nav-btn" data-tab="add">Добавить</button>
      <button class="nav-btn" data-tab="products">Продукты</button>
      <button class="nav-btn" data-tab="settings">Настройки</button>
    </div>
  </nav>

  <script src="app.js"></script>
</body>
</html>
