<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#09090b">
  <title>Трекер питания</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { 
      background-color: #000; 
      margin: 0; 
      padding: 0; 
      overscroll-behavior-y: none; 
      -webkit-tap-highlight-color: transparent;
      overflow: hidden; 
    }

    ::-webkit-scrollbar { width: 0px; background: transparent; }

    .safe-pb {
      padding-bottom: max(16px, env(safe-area-inset-bottom));
    }

    .fast-touch { touch-action: manipulation; }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;

    const IconPlus = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14m-7-7h14"/></svg>;
    const IconBook = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>;
    const IconCalendar = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
    const IconChevronLeft = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>;
    const IconChevronRight = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>;
    const IconTrash = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6"/></svg>;
    const IconTarget = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
    const IconEdit = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>;
    const IconDownload = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>;

    const STORAGE = {
      goals: "diet_goals_v2",
      foods: "diet_foods_v2",
      logs: "diet_logs_v2"
    };

    const getLocalDateString = (dateObj) => {
      const year = dateObj.getFullYear();
      const month = String(dateObj.getMonth() + 1).padStart(2, "0");
      const day = String(dateObj.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    };

    const displayDate = (dateString) => {
      const [year, month, day] = dateString.split("-");
      const d = new Date(year, month - 1, day);
      const todayStr = getLocalDateString(new Date());

      if (dateString === todayStr) return "Сегодня";

      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      if (dateString === getLocalDateString(yesterday)) return "Вчера";

      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      if (dateString === getLocalDateString(tomorrow)) return "Завтра";

      return d.toLocaleDateString("ru-RU", { day: "numeric", month: "long" });
    };

    const num = (value) => {
      const parsed = parseFloat(String(value ?? "").replace(",", "."));
      return Number.isFinite(parsed) ? parsed : 0;
    };

    const round = (value, digits = 1) => {
      const k = Math.pow(10, digits);
      return Math.round(num(value) * k) / k;
    };

    const pct = (current, target) => {
      if (!num(target)) return 0;
      return Math.min(100, Math.max(0, (num(current) / num(target)) * 100));
    };

    const today = getLocalDateString(new Date());

    const defaultGoals = {
      calories: 2000,
      protein: 160,
      fat: 65,
      carbs: 135
    };

    const defaultFoods = [
      { id: "1", name: "Куриное филе", calories: 113, protein: 23.6, fat: 1.9, carbs: 0 },
      { id: "2", name: "Гречка варёная", calories: 132, protein: 4.5, fat: 1.3, carbs: 25 },
      { id: "3", name: "Яйцо варёное", calories: 155, protein: 12.6, fat: 10.6, carbs: 1.1 },
      { id: "4", name: "Творог 5%", calories: 121, protein: 17, fat: 5, carbs: 1.8 },
      { id: "5", name: "Огурец", calories: 15, protein: 0.8, fat: 0.1, carbs: 2.8 }
    ];

    function ProgressBar({ value, color = "emerald" }) {
      const colorClass = {
        emerald: "bg-emerald-500",
        indigo: "bg-indigo-500",
        amber: "bg-amber-500",
        sky: "bg-sky-500",
        rose: "bg-rose-500"
      }[color];

      return (
        <div className="h-2 w-full bg-zinc-950 rounded-full overflow-hidden">
          <div className={`h-full ${colorClass} transition-all duration-500`} style={{ width: `${value}%` }} />
        </div>
      );
    }

    function MacroCard({ label, value, target, color, unit = "г" }) {
      const left = num(target) - num(value);
      const over = left < 0;
      const usedColor = over ? "rose" : color;

      const textClass = {
        emerald: "text-emerald-400",
        indigo: "text-indigo-400",
        amber: "text-amber-400",
        sky: "text-sky-400",
        rose: "text-rose-400"
      }[usedColor];

      return (
        <div className="bg-[#18181b] border border-zinc-800/50 rounded-2xl p-3">
          <div className="flex justify-between items-center mb-2">
            <span className="text-[9px] text-zinc-500 font-black uppercase">{label}</span>
            <span className={`text-[10px] font-black ${over ? "text-rose-400" : "text-zinc-400"}`}>
              {over ? "+" : ""}{round(Math.abs(left), 0)} {unit}
            </span>
          </div>

          <div className={`font-black text-lg ${textClass}`}>
            {round(value, unit === "ккал" ? 0 : 1)}
            <span className="text-[10px] text-zinc-600 ml-1">/ {target}</span>
          </div>

          <div className="mt-2">
            <ProgressBar value={pct(value, target)} color={usedColor} />
          </div>
        </div>
      );
    }

    function InputBox({ label, value, setValue, color, placeholder = "", type = "number" }) {
      return (
        <div>
          <span className="text-[9px] text-zinc-500 font-bold block mb-1">{label}</span>
          <input
            type={type}
            inputMode={type === "number" ? "decimal" : "text"}
            className={`w-full bg-[#27272a] rounded-xl p-3 ${color} font-bold outline-none min-w-0`}
            value={value}
            onChange={(e) => setValue(e.target.value)}
            placeholder={placeholder}
          />
        </div>
      );
    }

    function parseProductFromText(rawText) {
      const raw = String(rawText || "").trim();
      if (!raw) return null;

      const text = raw
        .replace(/\*\*/g, "")
        .replace(/≈/g, " ")
        .replace(/,/g, ".")
        .replace(/\u00a0/g, " ");

      const lines = text
        .split(/\n+/)
        .map(line => line.replace(/[|:]/g, " ").replace(/\s+/g, " ").trim())
        .filter(Boolean);

      let name = "";
      const banned = /^(на\s+\d+|на\s+100|показатель|значение|калории|белки|белок|жиры|углеводы|в\s+базу|для\s+приложения|таблица|итого)/i;

      for (const line of lines) {
        const clean = line
          .replace(/^#+\s*/, "")
          .replace(/^\-+\s*/, "")
          .replace(/^(продукт|название)\s+/i, "")
          .trim();

        if (
          clean.length >= 3 &&
          clean.length <= 60 &&
          !banned.test(clean) &&
          !/\d+\s*(ккал|г|гр|%)/i.test(clean) &&
          !/(можешь|добавить|значение|примерно|лучше|занеси|на 100)/i.test(clean)
        ) {
          name = clean;
          break;
        }
      }

      if (!name) {
        const nameMatch = text.match(/(?:продукт|название)\s*[:\-]\s*([^\n]+)/i);
        if (nameMatch) name = nameMatch[1].trim();
      }

      if (!name) name = "Новый продукт";

      let working = text;

      const per100Match = text.match(/на\s*100\s*г([\s\S]*?)(?:на\s*1|на\s*одн|в\s+базу|$)/i);
      if (per100Match) working = per100Match[1];

      const compact = text.match(/(\d+(?:\.\d+)?)\s*ккал\s*\/?\s*б\s*(\d+(?:\.\d+)?)\s*\/?\s*ж\s*(\d+(?:\.\d+)?)\s*\/?\s*у\s*(\d+(?:\.\d+)?)/i);
      if (compact) {
        return {
          name,
          calories: round(compact[1], 0),
          protein: round(compact[2], 1),
          fat: round(compact[3], 1),
          carbs: round(compact[4], 1)
        };
      }

      function findNumber(labelRegex, source) {
        const re = new RegExp(labelRegex + "\\s*[:\\-]?\\s*(\\d+(?:\\.\\d+)?)", "i");
        const m = source.match(re);
        if (m) return num(m[1]);

        const reReverse = new RegExp("(\\d+(?:\\.\\d+)?)\\s*(?:ккал|г|гр)?\\s*" + labelRegex, "i");
        const m2 = source.match(reReverse);
        if (m2) return num(m2[1]);

        return null;
      }

      let calories = findNumber("(?:калории|ккал|калорийность)", working);
      let protein = findNumber("(?:белки|белок|б\\b)", working);
      let fat = findNumber("(?:жиры|жир|ж\\b)", working);
      let carbs = findNumber("(?:углеводы|углевод|у\\b)", working);

      if ([calories, protein, fat, carbs].some(v => v === null)) {
        const allNums = working.match(/\d+(?:\.\d+)?/g)?.map(num) || [];
        if (allNums.length >= 4) {
          calories = calories ?? allNums[0];
          protein = protein ?? allNums[1];
          fat = fat ?? allNums[2];
          carbs = carbs ?? allNums[3];
        }
      }

      if ([calories, protein, fat, carbs].some(v => v === null)) return null;

      return {
        name,
        calories: round(calories, 0),
        protein: round(protein, 1),
        fat: round(fat, 1),
        carbs: round(carbs, 1)
      };
    }

    function App() {
      const mainRef = useRef(null);

      const [goals, setGoals] = useState(() => JSON.parse(localStorage.getItem(STORAGE.goals)) || defaultGoals);
      const [foods, setFoods] = useState(() => JSON.parse(localStorage.getItem(STORAGE.foods)) || defaultFoods);
      const [dailyLogs, setDailyLogs] = useState(() => JSON.parse(localStorage.getItem(STORAGE.logs)) || {});
      const [currentDate, setCurrentDate] = useState(today);
      const [activeTab, setActiveTab] = useState("diary");

      const [selectedFoodId, setSelectedFoodId] = useState("");
      const [gramsInput, setGramsInput] = useState("");

      const [newFood, setNewFood] = useState({ name: "", calories: "", protein: "", fat: "", carbs: "" });
      const [pasteText, setPasteText] = useState("");
      const [editingFoodId, setEditingFoodId] = useState(null);
      const [editingFood, setEditingFood] = useState(null);

      const [editingLogId, setEditingLogId] = useState(null);
      const [editingLog, setEditingLog] = useState({ foodId: "", grams: "" });

      useEffect(() => localStorage.setItem(STORAGE.goals, JSON.stringify(goals)), [goals]);
      useEffect(() => localStorage.setItem(STORAGE.foods, JSON.stringify(foods)), [foods]);
      useEffect(() => localStorage.setItem(STORAGE.logs, JSON.stringify(dailyLogs)), [dailyLogs]);

      useEffect(() => {
        if (mainRef.current) mainRef.current.scrollTop = 0;
      }, [activeTab, currentDate]);

      const currentDayLogs = dailyLogs[currentDate] || [];

      const totals = useMemo(() => {
        return currentDayLogs.reduce((sum, log) => {
          sum.calories += num(log.totalCalories);
          sum.protein += num(log.totalProtein);
          sum.fat += num(log.totalFat);
          sum.carbs += num(log.totalCarbs);
          return sum;
        }, { calories: 0, protein: 0, fat: 0, carbs: 0 });
      }, [currentDayLogs]);

      const remainingCalories = num(goals.calories) - totals.calories;

      function calcFood(food, gramsValue) {
        const grams = num(gramsValue);
        return {
          calories: Math.round((grams / 100) * num(food.calories)),
          protein: round((grams / 100) * num(food.protein), 1),
          fat: round((grams / 100) * num(food.fat), 1),
          carbs: round((grams / 100) * num(food.carbs), 1)
        };
      }

      function addLog(e) {
        e.preventDefault();

        const food = foods.find(f => f.id === selectedFoodId);
        const grams = num(gramsInput);

        if (!food || !grams) return;

        const calculated = calcFood(food, grams);

        const newLog = {
          id: Date.now().toString(),
          foodId: food.id,
          foodName: food.name,
          grams,
          totalCalories: calculated.calories,
          totalProtein: calculated.protein,
          totalFat: calculated.fat,
          totalCarbs: calculated.carbs
        };

        setDailyLogs(prev => ({
          ...prev,
          [currentDate]: [...(prev[currentDate] || []), newLog]
        }));

        setSelectedFoodId("");
        setGramsInput("");
      }

      function deleteLog(logId) {
        setDailyLogs(prev => ({
          ...prev,
          [currentDate]: (prev[currentDate] || []).filter(l => l.id !== logId)
        }));
      }

      function startEditLog(log) {
        setEditingLogId(log.id);
        setEditingLog({ foodId: log.foodId, grams: String(log.grams) });
      }

      function saveEditLog() {
        const food = foods.find(f => f.id === editingLog.foodId);
        const grams = num(editingLog.grams);

        if (!food || !grams) return;

        const calculated = calcFood(food, grams);

        setDailyLogs(prev => ({
          ...prev,
          [currentDate]: (prev[currentDate] || []).map(log => log.id === editingLogId ? {
            ...log,
            foodId: food.id,
            foodName: food.name,
            grams,
            totalCalories: calculated.calories,
            totalProtein: calculated.protein,
            totalFat: calculated.fat,
            totalCarbs: calculated.carbs
          } : log)
        }));

        setEditingLogId(null);
        setEditingLog({ foodId: "", grams: "" });
      }

      function saveFood(e) {
        e.preventDefault();

        if (!newFood.name.trim()) return;

        setFoods(prev => [
          ...prev,
          {
            id: Date.now().toString(),
            name: newFood.name.trim(),
            calories: num(newFood.calories),
            protein: num(newFood.protein),
            fat: num(newFood.fat),
            carbs: num(newFood.carbs)
          }
        ]);

        setNewFood({ name: "", calories: "", protein: "", fat: "", carbs: "" });
      }

      function addProductFromPaste() {
        const parsed = parseProductFromText(pasteText);

        if (!parsed) {
          alert("Не смог распознать. В тексте должны быть ккал, белки, жиры и углеводы на 100 г.");
          return;
        }

        setFoods(prev => [
          ...prev,
          {
            id: Date.now().toString(),
            ...parsed
          }
        ]);

        setPasteText("");
        alert(`Добавил продукт: ${parsed.name}`);
      }

      function fillProductFromPaste() {
        const parsed = parseProductFromText(pasteText);

        if (!parsed) {
          alert("Не смог распознать. В тексте должны быть ккал, белки, жиры и углеводы на 100 г.");
          return;
        }

        setNewFood({
          name: parsed.name,
          calories: String(parsed.calories),
          protein: String(parsed.protein),
          fat: String(parsed.fat),
          carbs: String(parsed.carbs)
        });
      }

      function startEditFood(food) {
        setEditingFoodId(food.id);
        setEditingFood({ ...food });
      }

      function saveEditFood() {
        if (!editingFood?.name?.trim()) return;

        setFoods(prev => prev.map(f => f.id === editingFoodId ? {
          ...f,
          name: editingFood.name.trim(),
          calories: num(editingFood.calories),
          protein: num(editingFood.protein),
          fat: num(editingFood.fat),
          carbs: num(editingFood.carbs)
        } : f));

        setEditingFoodId(null);
        setEditingFood(null);
      }

      function deleteFood(foodId) {
        setFoods(prev => prev.filter(f => f.id !== foodId));
      }

      function changeDate(offset) {
        const d = new Date(currentDate);
        d.setDate(d.getDate() + offset);
        setCurrentDate(getLocalDateString(d));
        setEditingLogId(null);
      }

      function exportBackup() {
        const data = {
          version: 2,
          goals,
          foods,
          dailyLogs,
          exportedAt: new Date().toISOString()
        };

        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `diet-tracker-backup-${currentDate}.json`;
        a.click();
        URL.revokeObjectURL(url);
      }

      function importBackup(e) {
        const file = e.target.files?.[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = () => {
          try {
            const data = JSON.parse(reader.result);
            if (data.goals) setGoals(data.goals);
            if (data.foods) setFoods(data.foods);
            if (data.dailyLogs) setDailyLogs(data.dailyLogs);
            alert("Backup восстановлен");
          } catch {
            alert("Не получилось прочитать backup");
          }
        };
        reader.readAsText(file);
      }

      function switchTab(tab) {
        setActiveTab(tab);
        setEditingFoodId(null);
        setEditingFood(null);
        setEditingLogId(null);
      }

      const selectedFood = foods.find(f => f.id === selectedFoodId);
      const preview = selectedFood && gramsInput ? calcFood(selectedFood, gramsInput) : null;

      return (
        <div className="flex flex-col h-[100dvh] w-full max-w-md mx-auto bg-[#09090b] text-zinc-100 font-sans shadow-2xl border-x border-zinc-900">
          <header className="shrink-0 pt-8 px-6 pb-4 bg-[#09090b] border-b border-zinc-800 flex justify-between items-center">
            <div>
              <h1 className="text-lg font-bold">{activeTab === "diary" ? "Дневник" : "База и цели"}</h1>
              <p className="text-[10px] text-zinc-500 font-bold uppercase mt-1">Трекер питания</p>
            </div>

            <div className="text-right">
              <div className={`text-lg font-black ${remainingCalories < 0 ? "text-rose-400" : "text-emerald-400"}`}>
                {Math.round(remainingCalories)}
              </div>
              <div className="text-[9px] text-zinc-500 font-bold uppercase">ккал осталось</div>
            </div>
          </header>

          <main ref={mainRef} className="flex-1 overflow-y-auto px-5 pt-4 pb-8">
            {activeTab === "diary" ? (
              <div className="space-y-6">
                <div className="flex items-center justify-between bg-[#18181b] rounded-2xl p-1 border border-zinc-800/50">
                  <button onClick={() => changeDate(-1)} className="fast-touch p-3 text-zinc-400 bg-transparent active:text-zinc-200">
                    <IconChevronLeft className="w-5 h-5" />
                  </button>

                  <button onClick={() => setCurrentDate(today)} className="fast-touch bg-transparent px-3 py-2">
                    <div className="font-bold text-sm text-zinc-200">{displayDate(currentDate)}</div>
                    <div className="text-[9px] text-zinc-600 font-bold uppercase">{currentDate}</div>
                  </button>

                  <button onClick={() => changeDate(1)} className="fast-touch p-3 text-zinc-400 bg-transparent active:text-zinc-200">
                    <IconChevronRight className="w-5 h-5" />
                  </button>
                </div>

                <div className="bg-[#18181b] rounded-3xl p-5 shadow-xl border border-zinc-800/50">
                  <div className="flex justify-between items-end mb-4">
                    <div>
                      <p className="text-[10px] text-zinc-500 uppercase font-bold mb-1">Калории</p>
                      <div className="flex items-baseline gap-1">
                        <span className="text-4xl font-black">{Math.round(totals.calories)}</span>
                        <span className="text-zinc-600 text-xs">/ {goals.calories}</span>
                      </div>
                    </div>

                    <div className={`text-right font-black ${remainingCalories < 0 ? "text-rose-400" : "text-emerald-400"}`}>
                      <span className="text-2xl">{Math.round(Math.abs(remainingCalories))}</span>
                      <span className="text-[10px] ml-1 uppercase">{remainingCalories < 0 ? "перебор" : "осталось"}</span>
                    </div>
                  </div>

                  <ProgressBar value={pct(totals.calories, goals.calories)} color={remainingCalories < 0 ? "rose" : "emerald"} />

                  <div className="grid grid-cols-3 gap-3 mt-5">
                    <MacroCard label="Белок" value={totals.protein} target={goals.protein} color="indigo" />
                    <MacroCard label="Жиры" value={totals.fat} target={goals.fat} color="amber" />
                    <MacroCard label="Углев." value={totals.carbs} target={goals.carbs} color="sky" />
                  </div>
                </div>

                <form onSubmit={addLog} className="bg-[#18181b] rounded-3xl p-5 border border-zinc-800/50 space-y-3">
                  <h2 className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Добавить еду</h2>

                  <select
                    className="w-full bg-[#27272a] rounded-2xl p-4 outline-none appearance-none text-zinc-200"
                    value={selectedFoodId}
                    onChange={(e) => setSelectedFoodId(e.target.value)}
                    required
                  >
                    <option value="" disabled className="text-zinc-500">Что съели?</option>
                    {foods.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
                  </select>

                  <div className="flex gap-3">
                    <input
                      type="number"
                      inputMode="decimal"
                      placeholder="Граммы"
                      className="flex-1 bg-[#27272a] rounded-2xl p-4 outline-none min-w-0 text-zinc-200"
                      value={gramsInput}
                      onChange={(e) => setGramsInput(e.target.value)}
                      required
                    />
                    <button type="submit" className="w-14 shrink-0 bg-emerald-600 rounded-2xl flex items-center justify-center fast-touch active:scale-95 transition-transform">
                      <IconPlus className="w-6 h-6 text-white" />
                    </button>
                  </div>

                  {preview && (
                    <div className="grid grid-cols-4 gap-2 pt-1">
                      <SmallMacro color="text-emerald-400" value={preview.calories} label="ккал" />
                      <SmallMacro color="text-indigo-400" value={preview.protein} label="б" />
                      <SmallMacro color="text-amber-400" value={preview.fat} label="ж" />
                      <SmallMacro color="text-sky-400" value={preview.carbs} label="у" />
                    </div>
                  )}
                </form>

                <div className="space-y-3">
                  <h2 className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Съедено за день</h2>

                  {currentDayLogs.length === 0 && (
                    <div className="bg-[#18181b] rounded-2xl p-5 text-center text-zinc-500 text-sm border border-zinc-800/30">
                      Пока нет еды за этот день
                    </div>
                  )}

                  {currentDayLogs.map(log => (
                    <div key={log.id} className="bg-[#18181b] rounded-2xl p-4 border border-zinc-800/30">
                      {editingLogId === log.id ? (
                        <div className="space-y-3">
                          <select
                            className="w-full bg-[#27272a] rounded-xl p-3 outline-none appearance-none text-zinc-200"
                            value={editingLog.foodId}
                            onChange={(e) => setEditingLog({...editingLog, foodId: e.target.value})}
                          >
                            {foods.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
                          </select>

                          <input
                            type="number"
                            inputMode="decimal"
                            className="w-full bg-[#27272a] rounded-xl p-3 outline-none min-w-0 text-emerald-400 font-bold"
                            value={editingLog.grams}
                            onChange={(e) => setEditingLog({...editingLog, grams: e.target.value})}
                            placeholder="Граммы"
                          />

                          <div className="grid grid-cols-2 gap-2">
                            <button onClick={saveEditLog} type="button" className="fast-touch bg-emerald-600 rounded-xl p-3 font-bold">Сохранить</button>
                            <button onClick={() => setEditingLogId(null)} type="button" className="fast-touch bg-[#27272a] rounded-xl p-3 font-bold">Отмена</button>
                          </div>
                        </div>
                      ) : (
                        <div className="flex justify-between items-center gap-3">
                          <div className="min-w-0">
                            <p className="font-bold text-sm truncate">{log.foodName}</p>
                            <p className="text-[10px] text-zinc-500 font-bold uppercase">{log.grams} г</p>
                          </div>

                          <div className="flex items-center gap-3 text-right">
                            <div>
                              <div className="text-emerald-400 font-bold text-sm">{log.totalCalories}</div>
                              <div className="text-[9px] font-bold">
                                <span className="text-indigo-400">Б {log.totalProtein}</span>
                                <span className="text-amber-400 ml-1">Ж {log.totalFat}</span>
                                <span className="text-sky-400 ml-1">У {log.totalCarbs}</span>
                              </div>
                            </div>

                            <button onClick={() => startEditLog(log)} className="fast-touch text-zinc-600 active:text-indigo-400 p-1 bg-transparent">
                              <IconEdit className="w-5 h-5" />
                            </button>

                            <button onClick={() => deleteLog(log.id)} className="fast-touch text-zinc-700 active:text-red-400 p-1 bg-transparent">
                              <IconTrash className="w-5 h-5" />
                            </button>
                          </div>
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              </div>
            ) : (
              <div className="space-y-8">
                <div className="bg-[#18181b] rounded-3xl p-5 border border-zinc-800/50">
                  <h2 className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-4 flex items-center gap-2">
                    <IconTarget className="w-4 h-4" /> Дневные цели
                  </h2>

                  <div className="grid grid-cols-2 gap-3">
                    <InputBox label="ККАЛ" value={goals.calories} color="text-emerald-400" setValue={(v) => setGoals({...goals, calories: v})} />
                    <InputBox label="БЕЛКИ" value={goals.protein} color="text-indigo-400" setValue={(v) => setGoals({...goals, protein: v})} />
                    <InputBox label="ЖИРЫ" value={goals.fat} color="text-amber-400" setValue={(v) => setGoals({...goals, fat: v})} />
                    <InputBox label="УГЛЕВОДЫ" value={goals.carbs} color="text-sky-400" setValue={(v) => setGoals({...goals, carbs: v})} />
                  </div>
                </div>

                <div className="bg-[#18181b] rounded-3xl p-5 border border-zinc-800/50 space-y-3">
                  <h2 className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Вставить продукт из ответа ChatGPT</h2>

                  <textarea
                    className="w-full bg-[#27272a] rounded-2xl p-4 outline-none min-h-[120px] text-zinc-200"
                    placeholder="Скопируй сюда мой ответ с КБЖУ. Например: Яйцо варёное... На 100 г: 155 ккал / Б 12.6 / Ж 10.6 / У 1.1"
                    value={pasteText}
                    onChange={(e) => setPasteText(e.target.value)}
                  />

                  <div className="grid grid-cols-2 gap-2">
                    <button type="button" onClick={fillProductFromPaste} className="fast-touch bg-[#27272a] active:bg-zinc-700 text-white rounded-xl p-3 font-bold">
                      Заполнить поля
                    </button>

                    <button type="button" onClick={addProductFromPaste} className="fast-touch bg-emerald-600 active:bg-emerald-700 text-white rounded-xl p-3 font-bold">
                      Добавить сразу
                    </button>
                  </div>

                  <p className="text-xs text-zinc-500 leading-relaxed">
                    Лучше вставлять данные «на 100 г». Если в ответе есть и «на 100 г», и «на 1 штуку», приложение старается брать именно «на 100 г».
                  </p>
                </div>

                <form onSubmit={saveFood} className="bg-[#18181b] rounded-3xl p-5 border border-zinc-800/50 space-y-4">
                  <h2 className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Новый продукт на 100 г</h2>

                  <InputBox label="НАЗВАНИЕ" type="text" value={newFood.name} color="text-zinc-200" placeholder="Название" setValue={(v) => setNewFood({...newFood, name: v})} />

                  <div className="grid grid-cols-2 gap-3">
                    <InputBox label="ККАЛ" value={newFood.calories} color="text-emerald-400" setValue={(v) => setNewFood({...newFood, calories: v})} />
                    <InputBox label="БЕЛКИ" value={newFood.protein} color="text-indigo-400" setValue={(v) => setNewFood({...newFood, protein: v})} />
                    <InputBox label="ЖИРЫ" value={newFood.fat} color="text-amber-400" setValue={(v) => setNewFood({...newFood, fat: v})} />
                    <InputBox label="УГЛЕВОДЫ" value={newFood.carbs} color="text-sky-400" setValue={(v) => setNewFood({...newFood, carbs: v})} />
                  </div>

                  <button type="submit" className="fast-touch w-full bg-indigo-600 active:bg-indigo-700 text-white rounded-xl p-4 font-bold transition-transform active:scale-95">
                    Добавить продукт
                  </button>
                </form>

                <div className="space-y-2">
                  <h2 className="text-[10px] font-bold text-zinc-500 uppercase mb-2">Список продуктов ({foods.length})</h2>

                  {foods.map(f => (
                    <div key={f.id} className="bg-[#18181b] rounded-xl p-3 border border-zinc-800/30">
                      {editingFoodId === f.id ? (
                        <div className="space-y-3">
                          <InputBox label="НАЗВАНИЕ" type="text" value={editingFood.name} color="text-zinc-200" setValue={(v) => setEditingFood({...editingFood, name: v})} />

                          <div className="grid grid-cols-2 gap-3">
                            <InputBox label="ККАЛ" value={editingFood.calories} color="text-emerald-400" setValue={(v) => setEditingFood({...editingFood, calories: v})} />
                            <InputBox label="БЕЛКИ" value={editingFood.protein} color="text-indigo-400" setValue={(v) => setEditingFood({...editingFood, protein: v})} />
                            <InputBox label="ЖИРЫ" value={editingFood.fat} color="text-amber-400" setValue={(v) => setEditingFood({...editingFood, fat: v})} />
                            <InputBox label="УГЛЕВОДЫ" value={editingFood.carbs} color="text-sky-400" setValue={(v) => setEditingFood({...editingFood, carbs: v})} />
                          </div>

                          <div className="grid grid-cols-2 gap-2">
                            <button onClick={saveEditFood} type="button" className="fast-touch bg-emerald-600 rounded-xl p-3 font-bold">Сохранить</button>
                            <button onClick={() => {setEditingFoodId(null); setEditingFood(null);}} type="button" className="fast-touch bg-[#27272a] rounded-xl p-3 font-bold">Отмена</button>
                          </div>
                        </div>
                      ) : (
                        <div className="flex justify-between items-center gap-3">
                          <div className="flex-1 min-w-0">
                            <span className="text-sm font-medium truncate block">{f.name}</span>
                            <div className="flex gap-2 text-[10px] font-bold uppercase mt-1 flex-wrap">
                              <span className="text-emerald-500">{f.calories} ккал</span>
                              <span className="text-indigo-500">Б {f.protein || 0}</span>
                              <span className="text-amber-500">Ж {f.fat || 0}</span>
                              <span className="text-sky-500">У {f.carbs || 0}</span>
                            </div>
                          </div>

                          <button onClick={() => startEditFood(f)} className="fast-touch text-zinc-600 active:text-indigo-400 p-2 bg-transparent">
                            <IconEdit className="w-5 h-5" />
                          </button>

                          <button onClick={() => deleteFood(f.id)} className="fast-touch text-zinc-800 active:text-red-500 p-2 bg-transparent">
                            <IconTrash className="w-5 h-5" />
                          </button>
                        </div>
                      )}
                    </div>
                  ))}
                </div>

                <div className="bg-[#18181b] rounded-3xl p-5 border border-zinc-800/50 space-y-3">
                  <h2 className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest flex items-center gap-2">
                    <IconDownload className="w-4 h-4" /> Backup
                  </h2>

                  <button onClick={exportBackup} className="fast-touch w-full bg-emerald-600 active:bg-emerald-700 text-white rounded-xl p-4 font-bold transition-transform active:scale-95">
                    Скачать backup
                  </button>

                  <label className="block fast-touch w-full bg-[#27272a] active:bg-zinc-700 text-white rounded-xl p-4 font-bold text-center transition-transform active:scale-95">
                    Загрузить backup
                    <input type="file" accept="application/json" className="hidden" onChange={importBackup} />
                  </label>

                  <p className="text-xs text-zinc-500 leading-relaxed">
                    Скачай JSON и скинь мне сюда — я смогу проанализировать КБЖУ, продукты и динамику по дням.
                  </p>
                </div>
              </div>
            )}
          </main>

          <nav className="shrink-0 bg-[#18181b] border-t border-zinc-800 flex justify-around pt-2 safe-pb relative z-40">
            <button onClick={() => switchTab("diary")} className={`fast-touch flex-1 flex flex-col items-center py-2 transition-all bg-transparent ${activeTab === "diary" ? "text-emerald-400" : "text-zinc-600 active:text-zinc-400"}`}>
              <IconCalendar className="w-6 h-6" />
              <span className="text-[9px] font-bold mt-1 uppercase">Дневник</span>
            </button>

            <button onClick={() => switchTab("directory")} className={`fast-touch flex-1 flex flex-col items-center py-2 transition-all bg-transparent ${activeTab === "directory" ? "text-indigo-400" : "text-zinc-600 active:text-zinc-400"}`}>
              <IconBook className="w-6 h-6" />
              <span className="text-[9px] font-bold mt-1 uppercase">База</span>
            </button>
          </nav>
        </div>
      );
    }

    function SmallMacro({ color, value, label }) {
      return (
        <div className="text-center bg-zinc-900 rounded-xl p-2">
          <div className={`${color} font-black text-sm`}>{value}</div>
          <div className="text-[8px] text-zinc-500 font-bold uppercase">{label}</div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
